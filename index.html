<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Annals</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&display=swap');
:root{
  --parch:#E9DCC3; --parch2:#DFCFAF; --ink:#2B2320; --ink2:#4a3f36;
  --gold:#C9A227; --red:#8a2f22; --edge:#b7a482;
}
*{box-sizing:border-box; margin:0; padding:0;}
html,body{width:100%;height:100%;overflow:hidden;background:#101318;}
body{font-family:'Segoe UI',system-ui,'Helvetica Neue',sans-serif;color:var(--ink);}
#gl{position:absolute;inset:0;}
canvas{display:block;}
.serif{font-family:'IM Fell English',Georgia,'Times New Roman',serif;}

/* ---------- loading ---------- */
#loading{position:absolute;inset:0;background:radial-gradient(ellipse at center,#1d2430 0%,#0c0f14 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;color:var(--parch);
  transition:opacity .8s;}
#loading h1{font-family:'IM Fell English',Georgia,serif;font-size:42px;letter-spacing:2px;margin-bottom:14px;color:var(--gold);}
#loadline{font-family:'IM Fell English',Georgia,serif;font-size:18px;font-style:italic;opacity:.85;min-height:26px;}
#loadbar{width:280px;height:3px;background:#2b3242;margin-top:18px;border-radius:2px;overflow:hidden;}
#loadbar>div{height:100%;width:0;background:var(--gold);transition:width .2s;}

/* ---------- HUD top ---------- */
#hud{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;gap:14px;
  padding:6px 12px;z-index:20;pointer-events:none;
  background:linear-gradient(180deg,rgba(20,16,12,.72),rgba(20,16,12,0));}
#hud .chip{display:flex;align-items:center;gap:6px;color:var(--parch);font-size:13px;
  text-shadow:0 1px 2px rgba(0,0,0,.8);white-space:nowrap;}
#hud .chip b{color:var(--gold);font-weight:600;}
#hud img.sig{width:18px;height:18px;border-radius:3px;border:1px solid rgba(233,220,195,.4);}
#datechip{font-family:'IM Fell English',Georgia,serif;font-size:16px !important;}
#timec{margin-left:auto;pointer-events:auto;display:flex;gap:4px;}
#timec button{background:rgba(233,220,195,.12);border:1px solid rgba(233,220,195,.35);color:var(--parch);
  min-width:34px;height:26px;border-radius:4px;cursor:pointer;font-size:12px;}
#timec button.on{background:var(--gold);color:#241d10;border-color:var(--gold);font-weight:700;}
#timec button:hover{border-color:var(--gold);}

/* ---------- Chronicle ---------- */
#chron{position:absolute;top:44px;right:10px;bottom:10px;width:340px;z-index:15;display:flex;flex-direction:column;
  background:linear-gradient(160deg,var(--parch),var(--parch2));border:1px solid var(--edge);border-radius:6px;
  box-shadow:0 6px 24px rgba(0,0,0,.5);overflow:hidden;}
#chron header{padding:8px 12px 4px;border-bottom:1px solid var(--edge);}
#chron h2{font-family:'IM Fell English',Georgia,serif;font-size:19px;font-weight:normal;color:var(--ink);}
#chronfilters{display:flex;gap:4px;padding:5px 10px;border-bottom:1px solid var(--edge);flex-wrap:wrap;}
#chronfilters .f{font-size:11px;padding:2px 9px;border-radius:10px;border:1px solid var(--edge);cursor:pointer;color:var(--ink2);background:transparent;}
#chronfilters .f.on{background:var(--ink);color:var(--parch);border-color:var(--ink);}
#chronlist{flex:1;overflow-y:auto;padding:6px 10px;scrollbar-width:thin;}
#chronlist::-webkit-scrollbar{width:6px}#chronlist::-webkit-scrollbar-thumb{background:var(--edge);border-radius:3px}
.centry{font-family:'IM Fell English',Georgia,serif;font-size:14px;line-height:1.35;padding:5px 4px;cursor:pointer;
  border-bottom:1px dotted rgba(74,63,54,.25);}
.centry:hover{background:rgba(201,162,39,.15);}
.centry .cd{color:var(--red);font-size:12px;font-style:italic;margin-right:4px;}
.creign{font-family:'IM Fell English',Georgia,serif;text-align:center;font-size:15px;color:var(--red);
  padding:10px 6px 6px;font-style:italic;}
.creign:before,.creign:after{content:"❦";color:var(--gold);margin:0 8px;font-style:normal;}
#chronfoot{display:flex;gap:6px;padding:6px 10px;border-top:1px solid var(--edge);}
#chronfoot button{flex:1;font-size:11px;padding:4px;background:transparent;border:1px solid var(--edge);border-radius:4px;cursor:pointer;color:var(--ink2);}
#chronfoot button:hover{border-color:var(--ink);color:var(--ink);}

/* ---------- Drawer ---------- */
#drawer{position:absolute;top:44px;left:10px;bottom:10px;width:270px;z-index:15;display:flex;flex-direction:column;
  background:linear-gradient(160deg,var(--parch),var(--parch2));border:1px solid var(--edge);border-radius:6px;
  box-shadow:0 6px 24px rgba(0,0,0,.5);overflow:hidden;transition:transform .3s;}
#drawer.closed{transform:translateX(-262px);}
#drawertab{position:absolute;right:-1px;top:8px;width:0;}
#drawertoggle{position:absolute;left:0;top:0;width:22px;height:44px;background:var(--parch);border:1px solid var(--edge);
  border-left:none;border-radius:0 5px 5px 0;cursor:pointer;color:var(--ink2);font-size:12px;}
#dtabs{display:flex;border-bottom:1px solid var(--edge);}
#dtabs .t{flex:1;text-align:center;font-size:12px;padding:7px 0;cursor:pointer;color:var(--ink2);border-right:1px solid var(--edge);}
#dtabs .t:last-child{border-right:none;}
#dtabs .t.on{background:var(--ink);color:var(--parch);}
#dbody{flex:1;overflow-y:auto;padding:10px;scrollbar-width:thin;}
#dbody::-webkit-scrollbar{width:6px}#dbody::-webkit-scrollbar-thumb{background:var(--edge);border-radius:3px}
.slrow{margin-bottom:9px;}
.slrow label{display:flex;justify-content:space-between;font-size:11.5px;color:var(--ink2);margin-bottom:2px;}
.slrow label b{color:var(--ink);font-weight:600;}
.slrow input[type=range]{width:100%;accent-color:var(--gold);height:16px;}
.actbtn{display:block;width:100%;text-align:left;font-size:12.5px;padding:6px 9px;margin-bottom:5px;cursor:pointer;
  background:rgba(43,35,32,.06);border:1px solid var(--edge);border-radius:4px;color:var(--ink);}
.actbtn:hover{background:var(--gold);border-color:var(--gold);color:#241d10;}
.actbtn .tg{float:right;color:var(--red);font-weight:700;}
.ovbtn{display:block;width:100%;text-align:left;font-size:12.5px;padding:6px 9px;margin-bottom:5px;cursor:pointer;
  background:transparent;border:1px solid var(--edge);border-radius:4px;color:var(--ink);}
.ovbtn.on{background:var(--ink);color:var(--parch);border-color:var(--ink);}
.wrow{margin-bottom:8px;font-size:12px;}
.wrow input[type=text]{width:100%;padding:5px;border:1px solid var(--edge);border-radius:4px;background:rgba(255,255,255,.4);font-size:13px;color:var(--ink);}
.wbtn{width:100%;font-size:12.5px;padding:6px;margin-bottom:5px;cursor:pointer;background:rgba(43,35,32,.06);
  border:1px solid var(--edge);border-radius:4px;color:var(--ink);}
.wbtn:hover{border-color:var(--ink);}
.houserow{display:flex;align-items:center;gap:7px;margin-bottom:7px;font-size:12px;}
.houserow img{width:22px;height:22px;border-radius:3px;border:1px solid var(--edge);}
.houserow .hbar{flex:1;height:5px;background:rgba(43,35,32,.15);border-radius:3px;overflow:hidden;}
.houserow .hbar>div{height:100%;background:var(--gold);}
.houserow.exiled .hname{text-decoration:line-through;opacity:.55;}
.dhead{font-family:'IM Fell English',Georgia,serif;font-size:14px;color:var(--red);margin:8px 0 6px;border-bottom:1px solid var(--edge);padding-bottom:2px;}
.succline{font-size:11.5px;color:var(--ink2);margin-bottom:3px;}

/* ---------- Inspector ---------- */
#insp{position:absolute;left:290px;bottom:14px;width:290px;z-index:16;display:none;
  background:linear-gradient(160deg,var(--parch),var(--parch2));border:1px solid var(--edge);border-radius:6px;
  box-shadow:0 6px 24px rgba(0,0,0,.5);padding:10px 12px;}
#insp h3{font-family:'IM Fell English',Georgia,serif;font-size:17px;font-weight:normal;display:flex;align-items:center;gap:8px;}
#insp h3 img{width:22px;height:22px;border-radius:3px;border:1px solid var(--edge);}
#insp .sub{font-size:11px;color:var(--red);font-style:italic;margin-bottom:6px;}
#insp .row{display:flex;justify-content:space-between;font-size:12px;padding:2px 0;color:var(--ink2);}
#insp .row b{color:var(--ink);font-weight:600;}
#insp .agline{font-family:'IM Fell English',Georgia,serif;font-style:italic;font-size:12.5px;margin-top:6px;color:var(--ink);}
#inspx{position:absolute;top:6px;right:9px;cursor:pointer;color:var(--ink2);font-size:14px;background:none;border:none;}
#inspfollow{margin-top:7px;width:100%;font-size:11.5px;padding:4px;cursor:pointer;background:transparent;border:1px solid var(--edge);border-radius:4px;color:var(--ink2);}
#inspfollow:hover{border-color:var(--ink);color:var(--ink);}

/* ---------- beat card ---------- */
#beat{position:absolute;left:50%;bottom:36px;transform:translateX(-50%);max-width:620px;z-index:14;
  background:rgba(20,16,12,.78);border:1px solid rgba(201,162,39,.5);border-radius:6px;padding:9px 20px;
  color:var(--parch);text-align:center;display:none;pointer-events:none;}
#beat .bt{font-family:'IM Fell English',Georgia,serif;font-size:17px;line-height:1.3;}
#beat .bd{font-size:11px;color:var(--gold);font-style:italic;margin-top:2px;}

/* watch-mode date */
#watchdate{position:absolute;top:14px;left:50%;transform:translateX(-50%);z-index:14;display:none;
  font-family:'IM Fell English',Georgia,serif;font-size:20px;color:var(--parch);text-shadow:0 1px 3px #000;pointer-events:none;}

#hint{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);z-index:13;font-size:11px;
  color:rgba(233,220,195,.55);pointer-events:none;text-shadow:0 1px 2px #000;white-space:nowrap;}

body.hideui #hud,body.hideui #chron,body.hideui #drawer,body.hideui #insp,body.hideui #hint{display:none !important;}
body.watch #chron,body.watch #drawer,body.watch #insp,body.watch #hint,body.watch #hud{display:none !important;}
body.watch #watchdate{display:block;}
#placehint{position:absolute;top:50px;left:50%;transform:translateX(-50%);z-index:30;display:none;
  background:var(--red);color:var(--parch);padding:5px 16px;border-radius:4px;font-size:13px;}
</style>
</head>
<body>
<div id="gl"></div>
<div id="loading"><h1 id="loadtitle">ANNALS</h1><div id="loadline">Forging the realm…</div><div id="loadbar"><div></div></div></div>

<div id="hud">
  <span class="chip" id="datechip">—</span>
  <span class="chip" id="wxchip">☀</span>
  <span class="chip" id="crownchip"><img class="sig" id="crownsig" alt=""><b id="crownname">—</b></span>
  <span class="chip">⛁ <b id="treasury">0</b></span>
  <span class="chip">☺ <b id="realmpop">0</b></span>
  <span class="chip" id="legitchip">♛ <b id="legit">0</b></span>
  <div id="timec">
    <button data-s="0" title="Pause (Space)">⏸</button><button data-s="1">▶</button><button data-s="2" class="on">▶▶</button><button data-s="3">▶▶▶</button><button data-s="4">▶▶▶▶</button>
  </div>
</div>
<div id="watchdate">—</div>

<div id="chron">
  <header><h2 id="chrontitle">The Annals</h2></header>
  <div id="chronfilters">
    <button class="f on" data-f="all">All</button>
    <button class="f" data-f="crown">Crown</button>
    <button class="f" data-f="war">War</button>
    <button class="f" data-f="trade">Trade</button>
    <button class="f" data-f="fates">Fates</button>
  </div>
  <div id="chronlist"></div>
  <div id="chronfoot">
    <button id="btnexport">Export chronicle</button>
    <button id="btnshare">Copy share link</button>
  </div>
</div>

<div id="drawer">
  <div id="dtabs">
    <div class="t on" data-t="rates">Rates</div>
    <div class="t" data-t="acts">Acts</div>
    <div class="t" data-t="over">Overlays</div>
    <div class="t" data-t="world">Realm</div>
  </div>
  <div id="dbody"></div>
  <div id="drawertab"><button id="drawertoggle">◂</button></div>
</div>

<div id="insp">
  <button id="inspx">✕</button>
  <h3 id="insptitle">—</h3>
  <div class="sub" id="inspsub"></div>
  <div id="inspbody"></div>
  <button id="inspfollow">Follow</button>
</div>

<div id="beat"><div class="bt" id="beattext"></div><div class="bd" id="beatdate"></div></div>
<div id="placehint">Click the map to place — Esc to cancel</div>
<div id="hint">drag orbit · right-drag pan · scroll zoom · click to inspect · Space pause · 1–4 speed · M map · C watch · H hide UI</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* =========================================================================
   ANNALS — a living kingdom in a single file
   Everything procedural. Seed in the URL hash is the whole save file.
   ========================================================================= */
'use strict';

/* ---------------- RNG: sfc32, separate streams for gen & history -------- */
function sfc32(a,b,c,d){return function(){a>>>=0;b>>>=0;c>>>=0;d>>>=0;let t=(a+b)|0;a=b^b>>>9;b=c+(c<<3)|0;c=(c<<21|c>>>11);d=d+1|0;t=t+d|0;c=c+t|0;return(t>>>0)/4294967296;};}
function seedStreams(seed){
  function mix(n){n=Math.imul(n^n>>>15,n|1);n^=n+Math.imul(n^n>>>7,n|61);return(n^n>>>14)>>>0;}
  const s=seed>>>0;
  return {
    gen: sfc32(mix(s),mix(s+0x9e37),mix(s+0x85eb),mix(s+0xc2b2)),
    sim: sfc32(mix(s+0x1b87),mix(s+0x27d4),mix(s+0x1656),mix(s+0x9c83))
  };
}
let SEED=1234567, RS=null;
const rand=(st)=>RS[st]();
const randi=(st,n)=>Math.floor(RS[st]()*n);
const pick=(st,arr)=>arr[Math.floor(RS[st]()*arr.length)];
const chance=(st,p)=>RS[st]()<p;
const lerp=(a,b,t)=>a+(b-a)*t;
const clamp=(v,a,b)=>v<a?a:(v>b?b:v);
const dist2d=(ax,az,bx,bz)=>Math.hypot(ax-bx,az-bz);

/* ---------------- value noise + fBm ------------------------------------- */
function makeNoise(seed){
  const s=seed|0;
  function h(x,y){let n=(x|0)*374761393+(y|0)*668265263+s*1013904223;n=Math.imul(n^(n>>>13),1274126177);n^=n>>>16;return(n>>>0)/4294967296;}
  return function(x,y){
    const xi=Math.floor(x),yi=Math.floor(y),xf=x-xi,yf=y-yi;
    const u=xf*xf*(3-2*xf),v=yf*yf*(3-2*yf);
    return h(xi,yi)*(1-u)*(1-v)+h(xi+1,yi)*u*(1-v)+h(xi,yi+1)*(1-u)*v+h(xi+1,yi+1)*u*v;
  };
}
function fbm(n2,x,y,oct,lac,gain){
  let a=.5,f=1,s=0,norm=0;
  for(let i=0;i<oct;i++){s+=a*n2(x*f,y*f);norm+=a;a*=gain;f*=lac;}
  return s/norm;
}

/* ---------------- constants --------------------------------------------- */
const SIZE=6000, GRID=220, CELL=SIZE/GRID, SEA=0;
const GOODS=['grain','fish','timber','ore','tools','cloth','wine'];
const GOODBASE={grain:2,fish:2.5,timber:3,ore:5,tools:9,cloth:7,wine:8};
const SEASONS=['Spring','Summer','Autumn','Winter'];
const SEASONGLYPH=['❀','☀','⚘','❄'];
const SPEEDS=[0,0.5,2,8,30];
const B={WATER:0,MARSH:1,MEADOW:2,FARM:3,FOREST:4,PINE:5,ROCK:6,SNOW:7};

/* archetype: [w,d,h, roofKind(0 gable,1 flat,2 spire), name] */
const ARCH={
  house:[7,8,4,0,'house'], longhouse:[14,7,4,0,'longhouse'], shop:[8,8,5,0,'shop'],
  smithy:[9,8,4,0,'smithy'], mill:[9,9,7,0,'mill'], granary:[8,8,6,0,'granary'],
  tavern:[11,10,6,0,'tavern'], temple:[12,18,9,2,'temple'], warehouse:[12,14,6,0,'warehouse'],
  tower:[7,7,14,1,'watchtower'], wall:[12,3,7,1,'wall'], keep:[20,24,18,1,'keep']
};
const TIERNAME=['hovel-built','timber-framed','stone-built'];

let W=null;               // the world
let MOD=null;             // rate sliders (multipliers)

/* ---------------- names & phonology ------------------------------------- */
const NAMEB={
  pfx:['Vael','Oster','Dun','Ald','Wester','Myr','Cael','Harren','Bel','Stane','Thorn','Elder','Ash','Fen','Grim','Hart','Rook','Sable','Wynd','Corve','Marle','Tarn','Bryn','Holm'],
  sfx:['mere','holt','ford','caster','wyck','march','fell','combe','worth','bridge','haven','moor','dale','garth','stead','port','field','burn'],
  maleN:['Aldric','Corwin','Edmund','Godfrey','Harlan','Osric','Roderic','Theobald','Wilfred','Baldric','Cedric','Dunstan','Emeric','Gareth','Leofric','Maynard','Oswin','Percival','Randolf','Sigmund','Tancred','Ulric','Waltheof','Berenger','Hamon','Ivo','Jocelin','Ranulf'],
  femN:['Adela','Berthilde','Clemence','Edith','Gisela','Helewise','Isolde','Maelis','Oriel','Rosamund','Sybilla','Theodora','Winifred','Aveline','Brunhild','Cateline','Elfrida','Godiva','Hawise','Ida','Judith','Linota','Maud','Nesta','Petronilla','Sabine'],
  epithets:['the Bold','the Just','the Cruel','the Pious','the Fat','the Wise','the Unready','the Fair','the Grim','the Gentle','the Old','the Younger'],
  dragon:['Vermithrax','Scatha','Ancalor','Morghul','Fyrentar','Uldrath','Cindervane','Naghrast','Velkorag','Ashmaw']
};
function placeName(){ return pick('gen',NAMEB.pfx)+pick('gen',NAMEB.sfx); }
function personName(sex){ return pick('gen',sex==='f'?NAMEB.femN:NAMEB.maleN); }
const CHARGES=['stag','tower','wave','oak','wolf','comet','key','sun','crescent','crown','swords','fish','raven','rose','anchor','flame'];
const HOUSEHUES=[[0x7a1f1f,0xe8d9a0],[0x1f3f6e,0xd8dee8],[0x24512a,0xe0d6b0],[0x5a3b6e,0xd9cfe0],[0x8a5a19,0xe8e0c8],[0x2b2320,0xc9a227]];

/* ---------------- heraldry: procedural sigils to canvas ----------------- */
function makeSigil(hue,charge){
  const c=document.createElement('canvas');c.width=c.height=48;const g=c.getContext('2d');
  const f='#'+hue[0].toString(16).padStart(6,'0'), m='#'+hue[1].toString(16).padStart(6,'0');
  g.fillStyle=f;g.fillRect(0,0,48,48);
  g.fillStyle='rgba(0,0,0,.18)';g.fillRect(0,24,48,24);
  g.strokeStyle=m;g.fillStyle=m;g.lineWidth=3;g.lineCap='round';g.lineJoin='round';
  const P=(pts,close)=>{g.beginPath();g.moveTo(pts[0][0],pts[0][1]);for(let i=1;i<pts.length;i++)g.lineTo(pts[i][0],pts[i][1]);if(close)g.closePath();};
  switch(charge){
    case 'stag':P([[16,38],[16,22],[10,10],[16,18],[20,8],[24,16],[28,8],[32,18],[38,10],[32,22],[32,38]]);g.stroke();break;
    case 'tower':P([[16,40],[16,16],[13,16],[13,10],[19,10],[19,14],[22,14],[22,10],[26,10],[26,14],[29,14],[29,10],[35,10],[35,16],[32,16],[32,40]],true);g.fill();break;
    case 'wave':g.beginPath();for(let i=0;i<3;i++){g.moveTo(8,18+i*8);g.bezierCurveTo(18,12+i*8,30,24+i*8,40,18+i*8);}g.stroke();break;
    case 'oak':g.beginPath();g.arc(24,18,10,0,7);g.fill();g.fillRect(21,24,6,16);break;
    case 'wolf':P([[12,38],[18,20],[14,12],[22,18],[26,10],[30,18],[36,14],[32,24],[36,38]],true);g.fill();break;
    case 'comet':g.beginPath();g.arc(32,14,6,0,7);g.fill();g.lineWidth=4;P([[28,18],[10,38]]);g.stroke();break;
    case 'key':g.beginPath();g.arc(24,14,6,0,7);g.stroke();g.fillRect(22,20,4,18);g.fillRect(26,30,6,3);g.fillRect(26,35,8,3);break;
    case 'sun':g.beginPath();g.arc(24,24,8,0,7);g.fill();for(let i=0;i<8;i++){const a=i*Math.PI/4;P([[24+Math.cos(a)*11,24+Math.sin(a)*11],[24+Math.cos(a)*17,24+Math.sin(a)*17]]);g.stroke();}break;
    case 'crescent':g.beginPath();g.arc(24,24,11,0,7);g.fill();g.fillStyle=f;g.beginPath();g.arc(29,21,10,0,7);g.fill();break;
    case 'crown':P([[12,34],[12,20],[18,26],[24,14],[30,26],[36,20],[36,34]],true);g.fill();break;
    case 'swords':P([[12,10],[36,38]]);g.stroke();P([[36,10],[12,38]]);g.stroke();g.fillRect(20,32,8,4);break;
    case 'fish':g.beginPath();g.ellipse(22,24,12,6,0,0,7);g.fill();P([[34,24],[42,17],[42,31]],true);g.fill();break;
    case 'raven':P([[14,36],[20,22],[16,14],[26,18],[34,10],[30,22],[34,30],[24,28]],true);g.fill();break;
    case 'rose':for(let i=0;i<5;i++){const a=i*Math.PI*2/5-Math.PI/2;g.beginPath();g.arc(24+Math.cos(a)*7,22+Math.sin(a)*7,5,0,7);g.fill();}g.fillStyle=f;g.beginPath();g.arc(24,22,3,0,7);g.fill();break;
    case 'anchor':g.beginPath();g.arc(24,12,4,0,7);g.stroke();g.fillRect(22,16,4,18);g.beginPath();g.arc(24,30,10,0.3,Math.PI-0.3);g.stroke();break;
    default:g.beginPath();g.moveTo(24,8);g.lineTo(30,26);g.lineTo(24,40);g.lineTo(18,26);g.closePath();g.fill();
  }
  return c;
}

/* =========================================================================
   WORLD GENERATION — runs once per seed, deterministic from the gen stream
   ========================================================================= */
const cIdx=(cx,cz)=>cz*GRID+cx;
const inB=(cx,cz)=>cx>=0&&cz>=0&&cx<GRID&&cz<GRID;
const cellX=(cx)=>cx*CELL-SIZE/2;   // lattice-aligned with the terrain mesh vertices
const cellZ=(cz)=>cz*CELL-SIZE/2;
const toCell=(x)=>clamp(Math.round((x+SIZE/2)/CELL),0,GRID-1);

function hAt(x,z){ // bilinear world-space height
  const fx=clamp((x+SIZE/2)/CELL,0,GRID-1.001), fz=clamp((z+SIZE/2)/CELL,0,GRID-1.001);
  const x0=Math.floor(fx),z0=Math.floor(fz),tx=fx-x0,tz=fz-z0;
  const x1=Math.min(x0+1,GRID-1),z1=Math.min(z0+1,GRID-1),h=W.h;
  return lerp(lerp(h[cIdx(x0,z0)],h[cIdx(x1,z0)],tx),lerp(h[cIdx(x0,z1)],h[cIdx(x1,z1)],tx),tz);
}
function slopeAt(cx,cz){
  const h=W.h,c=h[cIdx(cx,cz)];let m=0;
  for(const[dx,dz]of[[1,0],[-1,0],[0,1],[0,-1]])if(inB(cx+dx,cz+dz))m=Math.max(m,Math.abs(h[cIdx(cx+dx,cz+dz)]-c));
  return m/CELL;
}

async function generateWorld(seed,progress){
  SEED=seed>>>0; RS=seedStreams(SEED);
  const n1=makeNoise(SEED^0xA53), n2=makeNoise(SEED^0x5EED), n3=makeNoise(SEED^0xF00D), nMoist=makeNoise(SEED^0xB0A);
  W={seed:SEED,h:new Float32Array(GRID*GRID),water:new Uint8Array(GRID*GRID),flow:new Float32Array(GRID*GRID),
     biome:new Uint8Array(GRID*GRID),moist:new Float32Array(GRID*GRID),
     settlements:[],roads:[],routes:{},houses:[],notables:[],armies:[],caravans:[],banditCamps:[],
     riverPaths:[],bridges:[],roadCells:new Uint8Array(GRID*GRID),treasury:2200,legitimacy:70,
     clock:{day:0},weather:{state:'clear',t:0,wind:rand('gen')*Math.PI*2},snowpack:0,drought:false,flooding:0,
     war:null,truceUntil:0,plagueActive:false,comet:null,eclipse:0,prophet:null,
     dragon:null,monarch:null,reignStart:0,reignNum:{},name:placeName(),kingdomAdj:null,
     stats:{battles:0,greatFires:0}};

  await progress('Raising the bones of the earth…',0.05);
  /* --- terrain: fBm + domain warp + mountain spine + optional coast ----- */
  const spineA=rand('gen')*Math.PI, spineOff=(rand('gen')-0.5)*0.5;
  const coastal=rand('gen')<0.42, coastEdge=randi('gen',4); // 0=N 1=E 2=S 3=W
  const ca=Math.cos(spineA),sa=Math.sin(spineA);
  for(let cz=0;cz<GRID;cz++)for(let cx=0;cx<GRID;cx++){
    const u=cx/GRID-0.5,v=cz/GRID-0.5;
    const wx=fbm(n3,u*3+9,v*3,3,2,.5)-.5, wz=fbm(n3,u*3,v*3+7,3,2,.5)-.5; // domain warp
    let e=fbm(n1,(u+wx*.35)*4,(v+wz*.35)*4,5,2,.5);
    e=Math.pow(e,1.35);
    // mountain spine along a line through the map
    const d=Math.abs((u*ca+v*sa)-spineOff);
    const ridge=Math.exp(-d*d/(2*0.055*0.055))*(0.55+0.45*fbm(n2,u*7,v*7,4,2,.5));
    e=e*0.55+ridge*0.6;
    // gentle falloff at map rim so the world reads as an island of relevance
    const rim=Math.max(Math.abs(u),Math.abs(v))*2;
    e*=1-Math.pow(Math.max(0,rim-0.82)/0.18,2)*0.85;
    let hgt=e*760-20;
    if(coastal){
      const t=[v+0.5,0.5-u,0.5-v,u+0.5][coastEdge]; // distance from coast edge 0..1
      hgt-=Math.pow(Math.max(0,0.30-t)/0.30,1.6)*240;
    }
    W.h[cIdx(cx,cz)]=hgt;
    W.moist[cIdx(cx,cz)]=fbm(nMoist,u*5+3,v*5+11,4,2,.5);
  }
  // normalize: ensure some land above sea
  let maxh=-1e9;for(let i=0;i<W.h.length;i++)maxh=Math.max(maxh,W.h[i]);
  if(maxh<400)for(let i=0;i<W.h.length;i++)W.h[i]*=400/maxh;

  await progress('Carving the rivers…',0.2);
  /* --- hydrology: fill depressions, then flow accumulation, carve rivers --
     Priority-flood fill guarantees every cell drains monotonically to the
     map rim or the sea, so rivers always run from the highlands down. */
  {
    const visited=new Uint8Array(GRID*GRID);
    const heap=[];
    const hpush=(h,i)=>{heap.push([h,i]);let k=heap.length-1;
      while(k>0){const p=(k-1)>>1;if(heap[p][0]<=heap[k][0])break;const t=heap[p];heap[p]=heap[k];heap[k]=t;k=p;}};
    const hpop=()=>{const top=heap[0],last=heap.pop();
      if(heap.length){heap[0]=last;let k=0;
        for(;;){const l=k*2+1,r=l+1;let m=k;
          if(l<heap.length&&heap[l][0]<heap[m][0])m=l;
          if(r<heap.length&&heap[r][0]<heap[m][0])m=r;
          if(m===k)break;const t=heap[m];heap[m]=heap[k];heap[k]=t;k=m;}}
      return top;};
    for(let cx=0;cx<GRID;cx++){for(const cz of[0,GRID-1]){const i=cIdx(cx,cz);if(!visited[i]){visited[i]=1;hpush(W.h[i],i);}}}
    for(let cz=0;cz<GRID;cz++){for(const cx of[0,GRID-1]){const i=cIdx(cx,cz);if(!visited[i]){visited[i]=1;hpush(W.h[i],i);}}}
    while(heap.length){
      const[hh,c]=hpop();
      const cx=c%GRID,cz=(c/GRID)|0;
      for(let dz=-1;dz<=1;dz++)for(let dx=-1;dx<=1;dx++){
        if(!dx&&!dz)continue;const nx=cx+dx,nz=cz+dz;
        if(!inB(nx,nz))continue;const ni=cIdx(nx,nz);
        if(visited[ni])continue;
        visited[ni]=1;
        if(W.h[ni]<hh+0.05)W.h[ni]=hh+0.05; // fill pits just enough to drain
        hpush(W.h[ni],ni);
      }
    }
  }
  const order=[];for(let i=0;i<GRID*GRID;i++)order.push(i);
  order.sort((a,b)=>W.h[b]-W.h[a]);
  const down=new Int32Array(GRID*GRID).fill(-1);
  for(const i of order){
    const cx=i%GRID,cz=(i/GRID)|0;let best=-1,bh=W.h[i];
    for(let dz=-1;dz<=1;dz++)for(let dx=-1;dx<=1;dx++){
      if(!dx&&!dz)continue;const nx=cx+dx,nz=cz+dz;
      if(inB(nx,nz)&&W.h[cIdx(nx,nz)]<bh){bh=W.h[cIdx(nx,nz)];best=cIdx(nx,nz);}
    }
    down[i]=best;
  }
  for(let i=0;i<GRID*GRID;i++)W.flow[i]=1;
  for(const i of order){if(down[i]>=0)W.flow[down[i]]+=W.flow[i];}
  // mark sea
  for(let i=0;i<GRID*GRID;i++)if(W.h[i]<=SEA)W.water[i]=1;
  // major river: highest-accumulation land cell, trace to sea/edge; plus tributaries via threshold
  const RIVT=140;
  for(let i=0;i<GRID*GRID;i++)if(W.flow[i]>RIVT&&!W.water[i])W.water[i]=2;
  // guarantee one major river: from best mountain source follow down
  let srcBest=-1,srcScore=-1;
  for(let i=0;i<GRID*GRID;i++){if(W.h[i]>250&&W.flow[i]>20&&W.flow[i]*W.h[i]>srcScore&&down[i]>=0){srcScore=W.flow[i]*W.h[i];srcBest=i;}}
  if(srcBest>=0){let c=srcBest,guard=0;while(c>=0&&guard++<2000){if(!W.water[c])W.water[c]=2;if(W.h[c]<=SEA)break;c=down[c];}}
  // carve river cells & record paths for rendering
  const isRiv=(i)=>W.water[i]===2;
  for(let i=0;i<GRID*GRID;i++)if(isRiv(i)){W.h[i]-=Math.min(7,2+W.flow[i]*0.004);}
  // collect river polylines (from sources: river cells whose upstream has no river)
  const hasUp=new Uint8Array(GRID*GRID);
  for(let i=0;i<GRID*GRID;i++)if(isRiv(i)&&down[i]>=0&&isRiv(down[i]))hasUp[down[i]]=1;
  for(let i=0;i<GRID*GRID;i++)if(isRiv(i)&&!hasUp[i]){
    const path=[];let c=i,guard=0;
    while(c>=0&&guard++<2500){path.push({x:cellX(c%GRID),z:cellZ((c/GRID)|0),w:Math.min(34,6+W.flow[c]*0.012),h:W.h[c]});if(!isRiv(c))break;c=down[c];}
    if(path.length>4)W.riverPaths.push(path);
  }
  W.coastal=coastal;
  W.down=down; // drainage graph — reused for river barge routes

  await progress('Seeding meadow and forest…',0.35);
  /* --- biomes ------------------------------------------------------------ */
  for(let cz=0;cz<GRID;cz++)for(let cx=0;cx<GRID;cx++){
    const i=cIdx(cx,cz),h=W.h[i],m=W.moist[i],sl=slopeAt(cx,cz);
    if(W.water[i]===1){W.biome[i]=B.WATER;continue;}
    if(W.water[i]===2){W.biome[i]=B.WATER;continue;}
    let nearWater=false;
    for(let dz=-1;dz<=1;dz++)for(let dx=-1;dx<=1;dx++)if(inB(cx+dx,cz+dz)&&W.water[cIdx(cx+dx,cz+dz)])nearWater=true;
    if(h>560)W.biome[i]=B.SNOW;
    else if(h>430||sl>0.55)W.biome[i]=B.ROCK;
    else if(h>300&&m>0.35)W.biome[i]=B.PINE;
    else if(h<12&&nearWater&&m>0.55)W.biome[i]=B.MARSH;
    else if(m>0.58&&h<330)W.biome[i]=B.FOREST;
    else if(sl<0.12&&h<180&&m>0.32)W.biome[i]=B.FARM;
    else W.biome[i]=B.MEADOW;
  }

  await progress('Founding the settlements…',0.5);
  /* --- settlement siting -------------------------------------------------- */
  const score=(cx,cz)=>{
    const i=cIdx(cx,cz);
    if(W.water[i]||W.h[i]<3||W.h[i]>260)return -1;
    let s=0,riv=false,sea=false,farm=0,forest=0;
    for(let dz=-3;dz<=3;dz++)for(let dx=-3;dx<=3;dx++){
      if(!inB(cx+dx,cz+dz))continue;const j=cIdx(cx+dx,cz+dz);
      if(W.water[j]===2)riv=true;if(W.water[j]===1)sea=true;
      if(W.biome[j]===B.FARM)farm++;if(W.biome[j]===B.FOREST||W.biome[j]===B.PINE)forest++;
    }
    s+=riv?30:0;s+=sea?26:0;s+=farm*1.2;s+=Math.min(forest,8)*0.5;
    s-=slopeAt(cx,cz)*90;s-=W.h[i]*0.05;
    // flat buildable area
    let flat=0;for(let dz=-2;dz<=2;dz++)for(let dx=-2;dx<=2;dx++)if(inB(cx+dx,cz+dz)&&slopeAt(cx+dx,cz+dz)<0.15&&!W.water[cIdx(cx+dx,cz+dz)])flat++;
    s+=flat*0.9;
    return s;
  };
  const cand=[];
  for(let cz=4;cz<GRID-4;cz+=2)for(let cx=4;cx<GRID-4;cx+=2){const s=score(cx,cz);if(s>20)cand.push({cx,cz,s});}
  cand.sort((a,b)=>b.s-a.s);
  const nTowns=2+randi('gen',2), nVill=3+randi('gen',3);
  const wanted=[{kind:'capital',pop:2200+randi('gen',700),minD:0},
    ...Array.from({length:nTowns},()=>({kind:'town',pop:420+randi('gen',760),minD:850})),
    ...Array.from({length:nVill},()=>({kind:'village',pop:70+randi('gen',220),minD:520}))];
  for(const w of wanted){
    let placed=false;
    for(const c of cand){
      const x=cellX(c.cx),z=cellZ(c.cz);
      if(W.settlements.every(s=>dist2d(x,z,s.pos.x,s.pos.z)>Math.max(w.minD,520))){
        const i=cIdx(c.cx,c.cz);
        let sea=false,riv=false;
        for(let dz=-3;dz<=3;dz++)for(let dx=-3;dx<=3;dx++)if(inB(c.cx+dx,c.cz+dz)){if(W.water[cIdx(c.cx+dx,c.cz+dz)]===1)sea=true;if(W.water[cIdx(c.cx+dx,c.cz+dz)]===2)riv=true;}
        W.settlements.push({
          name:placeName(),kind:w.kind,pos:{x,z,y:W.h[i]},cx:c.cx,cz:c.cz,pop:w.pop,
          prosperity:50,unrest:8,walls:w.kind==='capital'?2:(w.kind==='town'&&chance('gen',0.5)?1:0),
          stores:{grain:w.pop*0.5,fish:sea?w.pop*0.3:8,timber:40,ore:10,tools:15,cloth:10,wine:8},
          harbor:sea,river:riv,owner:0,buildings:[],garrison:Math.round(w.pop*0.04),
          infected:0,recovered:0,plagueDead:0,fires:[],ruinCount:0,pyres:false,
          festivalUntil:0,siegeBy:null,revolted:false,growthClock:0,lastRaid:-999
        });
        placed=true;break;
      }
    }
    if(!placed&&cand.length){const c=cand[randi('gen',Math.min(80,cand.length))];/* fallback ignore spacing */}
  }
  // ensure at least capital + 4 others exist
  W.capital=W.settlements[0];

  await progress('Laying the king’s roads…',0.62);
  buildRoads();

  await progress('Raising timber and stone…',0.75);
  for(const s of W.settlements)layoutSettlement(s);

  await progress('Blazoning the great houses…',0.88);
  makeHousesAndCast();

  /* dragon lair at highest peak */
  let peak=0;for(let i=1;i<GRID*GRID;i++)if(W.h[i]>W.h[peak])peak=i;
  W.dragon={name:pick('gen',NAMEB.dragon),lair:{x:cellX(peak%GRID),z:cellZ((peak/GRID)|0),y:W.h[peak]},
    state:'sleeping',hoard:800,pos:null,path:null,target:null,mood:'slumbering',wakes:0};

  await progress('Opening the annals…',0.97);
}

/* ---------------- roads: A* over slope/water cost field ------------------ */
function buildRoads(){
  const cost=(a,b)=>{ // between neighboring cells
    const dh=Math.abs(W.h[a]-W.h[b])/CELL;
    let c=1+dh*dh*46;
    if(W.water[b]===1)return 1e9;
    if(W.water[b]===2)c+=26; // bridge
    const bi=W.biome[b];
    if(bi===B.FOREST||bi===B.PINE)c+=2.2;
    if(bi===B.MARSH)c+=6;if(bi===B.ROCK)c+=7;if(bi===B.SNOW)c+=14;
    return c;
  };
  function astar(s,t){
    // binary-heap A* — cheap enough to search the whole grid, so mountain
    // crossings get real switchback roads instead of falling back
    const g=new Float64Array(GRID*GRID).fill(Infinity);
    const from=new Int32Array(GRID*GRID).fill(-1);
    const closed=new Uint8Array(GRID*GRID);
    const heap=[];
    const hpush=(f,i)=>{heap.push([f,i]);let k=heap.length-1;
      while(k>0){const p=(k-1)>>1;if(heap[p][0]<=heap[k][0])break;const t2=heap[p];heap[p]=heap[k];heap[k]=t2;k=p;}};
    const hpop=()=>{const top=heap[0],last=heap.pop();
      if(heap.length){heap[0]=last;let k=0;
        for(;;){const l=k*2+1,r=l+1;let m=k;
          if(l<heap.length&&heap[l][0]<heap[m][0])m=l;
          if(r<heap.length&&heap[r][0]<heap[m][0])m=r;
          if(m===k)break;const t2=heap[m];heap[m]=heap[k];heap[k]=t2;k=m;}}
      return top;};
    const tx=t%GRID,tz=(t/GRID)|0;
    const hx=(i)=>Math.hypot(i%GRID-tx,((i/GRID)|0)-tz);
    g[s]=0;hpush(hx(s),s);
    let guard=0;
    while(heap.length&&guard++<200000){
      const cur=hpop()[1];
      if(closed[cur])continue;
      closed[cur]=1;
      if(cur===t)break;
      const cx=cur%GRID,cz=(cur/GRID)|0,gc=g[cur];
      for(let dz=-1;dz<=1;dz++)for(let dx=-1;dx<=1;dx++){
        if(!dx&&!dz)continue;const nx=cx+dx,nz=cz+dz;if(!inB(nx,nz))continue;
        const ni=cIdx(nx,nz);
        if(closed[ni])continue;
        const step=cost(cur,ni)*(dx&&dz?1.414:1);
        if(step>1e8)continue;
        const ng=gc+step;
        if(ng<g[ni]){g[ni]=ng;from[ni]=cur;hpush(ng+hx(ni),ni);}
      }
    }
    if(from[t]<0&&s!==t)return null;
    const path=[];let c=t;while(c>=0&&c!==s){path.push(c);c=from[c];}path.push(s);path.reverse();
    return path;
  }
  const connected=[0];
  for(let i=1;i<W.settlements.length;i++){
    // connect to nearest connected settlement
    let bj=-1,bd=1e18;
    for(const j of connected){const d=dist2d(W.settlements[i].pos.x,W.settlements[i].pos.z,W.settlements[j].pos.x,W.settlements[j].pos.z);if(d<bd){bd=d;bj=j;}}
    const a=W.settlements[i],b=W.settlements[bj];
    const cells=astar(cIdx(a.cx,a.cz),cIdx(b.cx,b.cz));
    if(cells){
      const path=cells.map(c=>({x:cellX(c%GRID),z:cellZ((c/GRID)|0)}));
      let len=0;for(let k=1;k<path.length;k++)len+=dist2d(path[k-1].x,path[k-1].z,path[k].x,path[k].z);
      for(const c of cells){
        if(W.water[c]===2)W.bridges.push({x:cellX(c%GRID),z:cellZ((c/GRID)|0)});
        else W.roadCells[c]=1; // tint the ground under the king's roads
      }
      W.roads.push({a:i,b:bj,path,len});
    }else{
      // no path found: lay a terrain-following track so the route is at least visible
      const path=[];const n=Math.max(2,Math.round(bd/25));
      for(let k=0;k<=n;k++){
        const x=lerp(a.pos.x,b.pos.x,k/n),z=lerp(a.pos.z,b.pos.z,k/n);
        path.push({x,z});
        const ci2=cIdx(toCell(x),toCell(z));
        if(!W.water[ci2])W.roadCells[ci2]=1;
      }
      W.roads.push({a:i,b:bj,path,len:bd});
    }
    connected.push(i);
  }
  // settlement-graph routing (BFS), route(a,b) => polyline
  W.adj={};W.settlements.forEach((s,i)=>W.adj[i]=[]);
  W.roads.forEach((r,ri)=>{W.adj[r.a].push({to:r.b,ri});W.adj[r.b].push({to:r.a,ri});});
}
function route(ai,bi){
  const key=ai+'_'+bi;
  if(W.routes[key])return W.routes[key];
  // BFS
  const prev={};const q=[ai];prev[ai]=null;
  while(q.length){const c=q.shift();if(c===bi)break;for(const e of W.adj[c])if(!(e.to in prev)){prev[e.to]=c;q.push(e.to);}}
  if(!(bi in prev))return null;
  const hops=[];let c=bi;while(prev[c]!==null){hops.push([prev[c],c]);c=prev[c];}hops.reverse();
  let poly=[];
  for(const[f,t]of hops){
    const r=W.roads.find(r=>(r.a===f&&r.b===t)||(r.a===t&&r.b===f));
    let seg=r.path.slice();
    if(r.a!==f)seg.reverse();
    if(poly.length)seg=seg.slice(1);
    poly=poly.concat(seg);
  }
  let len=0;for(let k=1;k<poly.length;k++)len+=dist2d(poly[k-1].x,poly[k-1].z,poly[k].x,poly[k].z);
  const res={poly,len};W.routes[key]=res;
  return res;
}
/* river barge routing: two settlements are river-linked if their drainage
   traces meet — same river, or tributary joining the main stem */
function traceDown(ci){
  const seq=[];let c=ci,g=0;
  while(c>=0&&g++<3000){seq.push(c);if(W.h[c]<=SEA)break;c=W.down[c];}
  return seq;
}
function riverRoute(ai,bi){
  const A=W.settlements[ai],Bs=W.settlements[bi];
  if(A.rivCell==null||Bs.rivCell==null)return null;
  const sa=traceDown(A.rivCell),sb=traceDown(Bs.rivCell);
  const setB=new Map(sb.map((c,j)=>[c,j]));
  let mi=-1,mj=-1;
  for(let i=0;i<sa.length;i++){if(setB.has(sa[i])){mi=i;mj=setB.get(sa[i]);break;}}
  if(mi<0)return null;
  const cells=sa.slice(0,mi+1).concat(sb.slice(0,mj).reverse());
  if(cells.length<4)return null;
  const poly=cells.map(c=>({x:cellX(c%GRID),z:cellZ((c/GRID)|0)}));
  let len=0;for(let k=1;k<poly.length;k++)len+=dist2d(poly[k-1].x,poly[k-1].z,poly[k].x,poly[k].z);
  return {poly,len};
}

/* ---------------- settlement layout: streets, lots, buildings ------------ */
function layoutSettlement(s){
  const idx=W.settlements.indexOf(s);
  const isCap=s.kind==='capital';
  const R=isCap?240:s.kind==='town'?150:70; // walled/initial core radius
  s.radius=R+40;
  const count=Math.min(isCap?Math.round(s.pop/4):Math.round(s.pop/4.2),isCap?620:s.kind==='town'?280:48);
  const buildable=(x,z)=>{const ci=toCell(x),cj=toCell(z);const i=cIdx(ci,cj);return !W.water[i]&&slopeAt(ci,cj)<0.35&&W.h[i]>1;};
  /* street directions seeded from where the king's roads enter town */
  const dirs=[];
  for(const r of W.roads){
    if(r.a===idx||r.b===idx){
      const p=r.a===idx?r.path[Math.min(4,r.path.length-1)]:r.path[Math.max(0,r.path.length-5)];
      dirs.push(Math.atan2(p.z-s.pos.z,p.x-s.pos.x));
    }
  }
  const nd=isCap?6:s.kind==='town'?4:3;
  while(dirs.length<nd)dirs.push(rand('gen')*Math.PI*2);
  /* streets: wiggling spokes from the market square + ring streets */
  s.streets=[];
  for(const d of dirs){
    const pts=[];let a=d;
    for(let r=12;r<=R;r+=13){
      a+=(rand('gen')-0.5)*0.13;
      const x=s.pos.x+Math.cos(a)*r,z=s.pos.z+Math.sin(a)*r;
      if(!buildable(x,z))break;
      pts.push({x,z});
    }
    if(pts.length>=2)s.streets.push(pts);
  }
  const rings=isCap?[0.42,0.78]:s.kind==='town'?[0.62]:[];
  for(const rf of rings){
    const rr=R*rf;let pts=[];
    const n=Math.max(10,Math.round(rr*2*Math.PI/14));
    for(let i=0;i<=n;i++){
      const a=i/n*Math.PI*2;
      const x=s.pos.x+Math.cos(a)*rr,z=s.pos.z+Math.sin(a)*rr;
      if(!buildable(x,z)){if(pts.length>=3)s.streets.push(pts);pts=[];continue;}
      pts.push({x,z});
    }
    if(pts.length>=3)s.streets.push(pts);
  }
  /* building slots line the street frontages, facing the street */
  const slots=[];
  for(const st of s.streets){
    for(let i=0;i<st.length-1;i++){
      const a=st[i],b=st[i+1];
      const dx=b.x-a.x,dz=b.z-a.z,L=Math.hypot(dx,dz)||1;
      const ux=dx/L,uz=dz/L,px=-uz,pz=ux;
      for(let t=5;t<L;t+=12.5){
        const mx=a.x+ux*t,mz=a.z+uz*t;
        for(const side of[-1,1]){
          slots.push({x:mx+px*side*8.5,z:mz+pz*side*8.5,
            rot:Math.atan2(uz,ux)+(side<0?Math.PI:0),
            d:dist2d(mx,mz,s.pos.x,s.pos.z)});
        }
      }
    }
  }
  for(let i=slots.length-1;i>0;i--){const j=randi('gen',i+1);const t=slots[i];slots[i]=slots[j];slots[j]=t;}
  const occ=[];
  const free=(x,z,rr)=>occ.every(o=>dist2d(x,z,o.x,o.z)>rr+o.r);
  function place(arch,tier,x,z,rot,district){
    const a=ARCH[arch];
    const b={arch,tier,x,z,rot,w:a[0]*(0.85+tier*0.15),d:a[1]*(0.85+tier*0.15),h:a[2]*(0.8+tier*0.25),
      roof:a[3],district,state:'sound',s:s,y:hAt(x,z),burnT:0,rebuildT:0};
    s.buildings.push(b);occ.push({x,z,r:Math.max(b.w,b.d)*0.62});
    return b;
  }
  /* keep on defensible high ground inside the walls */
  if(isCap){
    let bx=s.pos.x,bz=s.pos.z,bh=-1;
    for(let a=0;a<24;a++){const ang=a/24*Math.PI*2,x=s.pos.x+Math.cos(ang)*R*0.55,z=s.pos.z+Math.sin(ang)*R*0.55;
      if(buildable(x,z)&&hAt(x,z)>bh){bh=hAt(x,z);bx=x;bz=z;}}
    s.keepPos={x:bx,z:bz,y:hAt(bx,bz)};
    place('keep',2,bx,bz,rand('gen')*Math.PI,'keep');
  }
  /* civic core around the market square */
  place(isCap||s.kind==='town'?'temple':'granary',isCap?2:1,s.pos.x+20,s.pos.z-17,rand('gen')*0.6,'temple');
  place('tavern',isCap?2:1,s.pos.x-21,s.pos.z+15,rand('gen')*0.6,'market');
  place('granary',1,s.pos.x+24,s.pos.z+21,rand('gen')*0.6,'market');
  if(s.harbor||s.river)place('warehouse',1,s.pos.x-26,s.pos.z-23,rand('gen')*0.6,'market');
  if(s.river){ // mill on the watercourse
    let best=null,bd=1e9;
    for(let dz=-6;dz<=6;dz++)for(let dx=-6;dx<=6;dx++){
      const ci=s.cx+dx,cj=s.cz+dz;if(!inB(ci,cj)||W.water[cIdx(ci,cj)]!==2)continue;
      const d=dx*dx+dz*dz;if(d<bd){bd=d;best={x:cellX(ci)+CELL*0.8,z:cellZ(cj)};}
    }
    if(best&&buildable(best.x,best.z))s.mill=place('mill',1,best.x,best.z,rand('gen')*Math.PI,'artisan');
  }
  /* fill street frontage: district & tier by distance from the square */
  let placed=0;
  for(const sl of slots){
    if(placed>=count)break;
    if(!buildable(sl.x,sl.z))continue;
    const dc=clamp(sl.d/R,0,1);
    let district,arch;
    if(dc<0.3){district='market';arch=pick('gen',['shop','shop','tavern','house','warehouse']);}
    else if(dc<0.55){district='artisan';arch=pick('gen',['smithy','shop','house','house','longhouse']);}
    else{district='residential';arch=pick('gen',['house','house','house','longhouse','granary']);}
    let tier=dc<0.3?2:dc<0.65?1:0;
    if(s.kind==='village')tier=Math.max(0,tier-1);
    if(rand('gen')<0.2)tier=Math.max(0,tier-1);
    if(!free(sl.x,sl.z,Math.max(ARCH[arch][0],ARCH[arch][1])*0.6))continue;
    place(arch,tier,sl.x,sl.z,sl.rot+(rand('gen')-0.5)*0.08,district);
    placed++;
  }
  /* walls enclose the whole initial town; growth later spills outside */
  if(s.walls>0){
    const wr=R+14;const segs=Math.round(wr*2*Math.PI/13);
    s.wallSegs=[];
    for(let i=0;i<segs;i++){
      const a=i/segs*Math.PI*2,x=s.pos.x+Math.cos(a)*wr,z=s.pos.z+Math.sin(a)*wr;
      if(!buildable(x,z))continue;
      const isGate=dirs.some(d=>Math.abs(Math.atan2(Math.sin(a-d),Math.cos(a-d)))<0.1);
      if(isGate)continue;
      s.wallSegs.push({x,z,rot:a+Math.PI/2,y:hAt(x,z)});
      if(i%7===0)place('tower',s.walls,x,z,a,'keep');
    }
  }
  s.coreR=R;
}

let NID=1;
function mkNotable(o){

    const kid=mkNotable({name:personName(ks),sex:ks,age:Math.max(1,randi('gen',Math.max(2,monarch.age-20))),house:0,role:'heir',traits:twoTraits(),agenda:'learns the ways of court'});

    const head=mkNotable({name:personName(hsx),sex:hsx,age:30+randi('gen',25),house:hi,role:'head',traits:twoTraits(),agenda:pick('gen',['covets the crown','guards the marches','fills the coffers','nurses an old grudge','seeks a royal match'])});
    const sp=mkNotable({name:personName(hsx==='m'?'f':'m'),sex:hsx==='m'?'f':'m',age:26+randi('gen',20),house:hi,role:'spouse',traits:twoTraits()});

    const kids=1+randi('gen',3);

      const ks=chance('gen',0.5)?'m':'f';
      const kid=mkNotable({name:personName(ks),sex:ks,age:Math.max(1,randi('gen',Math.max(2,head.age-18))),house:hi,role:'scion',traits:twoTraits(),agenda:'rides at the hunt'});
      head.heirs.push(kid.id);

  mkNotable({name:personName(chance('gen',0.5)?'m':'f'),sex:'m',age:50+randi('gen',20),house:0,role:'High Priest',traits:['pious',pick('gen',TRAITS)],agenda:'reads the omens'});

  }
}
function notableById(id){return W.notables.find(n=>n.id===id);}

function mergeGeoms(list){ // list of [geometry, matrix] → one non-indexed BufferGeometry
  let pos=[],norm=[];
  const nm=new THREE.Matrix3();
  for(const[g0,m]of list){
    const g=g0.index?g0.toNonIndexed():g0;
    nm.getNormalMatrix(m);
    const p=g.attributes.position,n=g.attributes.normal,v=new THREE.Vector3();
    for(let i=0;i<p.count;i++){
      v.set(p.getX(i),p.getY(i),p.getZ(i)).applyMatrix4(m);pos.push(v.x,v.y,v.z);
      v.set(n.getX(i),n.getY(i),n.getZ(i)).applyNormalMatrix(m);norm.push(v.x,v.y,v.z);
    }
    if(g!==g0)g.dispose();
  }
  const out=new THREE.BufferGeometry();
  out.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
  out.setAttribute('normal',new THREE.Float32BufferAttribute(norm,3));
  return out;
}
const M4=new THREE.Matrix4(),Q1=new THREE.Quaternion(),V1=new THREE.Vector3(),V2=new THREE.Vector3(),C1=new THREE.Color();
function setInst(im,i,x,y,z,ry,sx,sy,sz){

  im.setMatrixAt(i,M4);
}

function chaikin(pts,passes){ // corner-cutting smoothing
  for(let k=0;k<passes;k++){
    const out=[pts[0]];
    for(let i=0;i<pts.length-1;i++){
      const a=pts[i],b=pts[i+1];
      out.push({x:a.x*0.75+b.x*0.25,z:a.z*0.75+b.z*0.25,w:(a.w||8)*0.75+(b.w||8)*0.25});
      out.push({x:a.x*0.25+b.x*0.75,z:a.z*0.25+b.z*0.75,w:(a.w||8)*0.25+(b.w||8)*0.75});
    }
    out.push(pts[pts.length-1]);
    pts=out;
  }
  return pts;
}
function ribbon(pts,acc,hw,lift){ // append triangles for a terrain-following strip
  for(let k=0;k<pts.length-1;k++){
    const a=pts[k],b=pts[k+1];
    const dx=b.x-a.x,dz=b.z-a.z,L=Math.hypot(dx,dz)||1;
    const wA=hw??(Math.max(10,a.w||10)/2),wB=hw??(Math.max(10,b.w||10)/2);
    const px=-dz/L,pz=dx/L;
    const ya=hAt(a.x,a.z)+lift,yb=hAt(b.x,b.z)+lift;
    acc.p.push(a.x+px*wA,ya,a.z+pz*wA, a.x-px*wA,ya,a.z-pz*wA, b.x-px*wB,yb,b.z-pz*wB,
               a.x+px*wA,ya,a.z+pz*wA, b.x-px*wB,yb,b.z-pz*wB, b.x+px*wB,yb,b.z+pz*wB);
    for(let i=0;i<6;i++)acc.n.push(0,1,0);
  }
}
function rebuildRoadMesh(){ // king's roads (wide) + settlement streets (narrow), one merged mesh
  if(G.roads){scene.remove(G.roads);G.roads.geometry.dispose();}
  const rd={p:[],n:[]};
  for(const r of W.roads)ribbon(chaikin(r.path,1),rd,5.2,0.9);
  for(const s of W.settlements)if(s.streets)for(const st of s.streets)ribbon(st,rd,2.6,0.8);
  const rrg=new THREE.BufferGeometry();
  rrg.setAttribute('position',new THREE.Float32BufferAttribute(rd.p,3));
  rrg.setAttribute('normal',new THREE.Float32BufferAttribute(rd.n,3));
  G.roads=new THREE.Mesh(rrg,G.roadMat||(G.roadMat=new THREE.MeshLambertMaterial({color:0x8f7c55,
    polygonOffset:true,polygonOffsetFactor:-2,polygonOffsetUnits:-2})));
  scene.add(G.roads);
}
function colorForVertex(i,sp,snowT,seed){

  switch(bio){

      }
      break;
    case B.MARSH:c=C1.setHex(sp.marsh);break;
    case B.MEADOW:c=C1.setHex(sp.mead);break;
    case B.FARM:c=C1.setHex(sp.farm);if(((i*7)%13)<3)c.multiplyScalar(0.9);break;
    case B.FOREST:c=C1.setHex(sp.forest);break;
    case B.PINE:c=C1.setHex(sp.pine);break;
    case B.ROCK:c=C1.setHex(sp.rock);break;
    default:c=C1.setHex(0xe8ecef);
  }
  c.multiplyScalar(0.92+n*0.16);
  if(bio===B.ROCK||bio===B.SNOW){ // coherent snowcaps: whiten smoothly with height
    const t=clamp((h-470)/130,0,1);
    c.lerp(new THREE.Color(0xe9edf2),t*t);
  }
  // note: road/river overlays are stamped after the blend pass so they stay crisp
  if(W.drought&&(bio===B.MEADOW||bio===B.FARM))c.lerp(new THREE.Color(0xb3a35c),0.55);
  // winter snow accumulation on flat/high ground
  if(snowT>0&&bio!==B.WATER){
    const t=clamp(snowT*(h>380?1:h>120?0.75:0.55),0,1);
    c.lerp(new THREE.Color(0xe9edf2),t);
  }
  return c;
}
function buildTerrain(){
  const g=new THREE.PlaneGeometry(SIZE,SIZE,GRID-1,GRID-1);
  g.rotateX(-Math.PI/2);
  const p=g.attributes.position;
  for(let i=0;i<p.count;i++)p.setY(i,W.h[i]);
  g.computeVertexNormals();
  const col=new Float32Array(p.count*3);

  G.terrain=new THREE.Mesh(g,new THREE.MeshLambertMaterial({vertexColors:true}));

    G.sea=new THREE.Mesh(sg,new THREE.MeshPhongMaterial({color:0x2e6285,transparent:true,opacity:0.92,shininess:90,specular:0x88aabb}));

  const bg=new THREE.BoxGeometry(1,1,1);
  G.bridges=new THREE.InstancedMesh(bg,new THREE.MeshLambertMaterial({color:0x7d6748}),Math.max(1,W.bridges.length));
  W.bridges.forEach((b,i)=>setInst(G.bridges,i,b.x,hAt(b.x,b.z)+1.6,b.z,0,26,2.2,9));
  G.bridges.instanceMatrix.needsUpdate=true;

let lastSeasonKey='';
function updateTerrainColors(si,blend){
  const sp0=PAL.seasons[si],sp1=PAL.seasons[(si+1)%4];
  const snowT=si===3?0.85:(si===0?Math.max(0,0.5-blend*2)*0.8:0);
  const key=si+'_'+(blend*8|0)+'_'+(W.drought?1:0);
  if(key===lastSeasonKey)return;lastSeasonKey=key;
  const sp={};for(const k of['mead','farm','forest','pine','rock','marsh']){
    const c0=new THREE.Color(sp0[k]),c1=new THREE.Color(sp1[k]);sp[k]=c0.lerp(c1,blend*blend).getHex();
  }
  const col=G.terrain.geometry.attributes.color,N=col.count;
  if(!G._cbuf)G._cbuf=new Float32Array(N*3);
  const buf=G._cbuf;
  for(let i=0;i<N;i++){
    const c=colorForVertex(i,sp,snowT,SEED);
    buf[i*3]=c.r;buf[i*3+1]=c.g;buf[i*3+2]=c.b;
  }
  // gentle neighbor blend calms biome banding into painterly gradients
  for(let cz=0;cz<GRID;cz++)for(let cx=0;cx<GRID;cx++){
    const i=cIdx(cx,cz);
    let r=buf[i*3]*0.6,g=buf[i*3+1]*0.6,b=buf[i*3+2]*0.6,ws=0.6;
    for(const[dx,dz]of[[1,0],[-1,0],[0,1],[0,-1]]){
      if(!inB(cx+dx,cz+dz))continue;
      const j=cIdx(cx+dx,cz+dz);
      r+=buf[j*3]*0.1;g+=buf[j*3+1]*0.1;b+=buf[j*3+2]*0.1;ws+=0.1;
    }
    col.setXYZ(i,r/ws,g/ws,b/ws);
  }
  // crisp overlays AFTER the blur: rivers stay blue, roads stay packed earth
  const riverC=new THREE.Color(0x3a6d8e).lerp(new THREE.Color(0xcfdae2),snowT>0.5?0.5:0);
  const roadC=new THREE.Color(0x8a7448);
  for(let i=0;i<N;i++){
    if(W.water[i]===2){
      col.setXYZ(i,riverC.r,riverC.g,riverC.b);
    }else if(W.roadCells[i]){
      C1.setRGB(col.getX(i),col.getY(i),col.getZ(i)).lerp(roadC,0.85);
      col.setXYZ(i,C1.r,C1.g,C1.b);
    }
  }
  col.needsUpdate=true;
  // trees seasonal tint
  if(G.decid){
    const dc=new THREE.Color([0x40682f,0x4a6c2e,0x96541e,0x5e5344][si]);
    G.decid.material.color.copy(dc);
    G.pine.material.color.setHex(si===3?0x314a37:0x28472f);
  }
}

function buildTrees(){
  const trunk=new THREE.CylinderGeometry(0.5,0.8,3.2,5);trunk.translate(0,1.6,0);
  const blob=new THREE.IcosahedronGeometry(3.4,0);blob.translate(0,5.4,0);blob.scale(1,1.15,1);
  const decidG=mergeGeoms([[trunk,new THREE.Matrix4()],[blob,new THREE.Matrix4()]]);
  const cone=new THREE.ConeGeometry(2.6,7.5,6);cone.translate(0,5.2,0);
  const pineG=mergeGeoms([[trunk,new THREE.Matrix4()],[cone,new THREE.Matrix4()]]);
  const spots={dec:[],pine:[]};
  const nj=makeNoise(SEED^0x77E);
  for(let cz=0;cz<GRID;cz++)for(let cx=0;cx<GRID;cx++){
    const i=cIdx(cx,cz),bio=W.biome[i];
    if(bio!==B.FOREST&&bio!==B.PINE)continue;
    if(W.settlements.some(s=>dist2d(cellX(cx),cellZ(cz),s.pos.x,s.pos.z)<s.radius*0.8))continue;
    const dens=bio===B.FOREST?3:2;
    for(let t=0;t<dens;t++){
      const x=cellX(cx)+ (nj(cx*3+t*7,cz*3)-0.5)*CELL*1.4, z=cellZ(cz)+(nj(cx*3,cz*3+t*13)-0.5)*CELL*1.4;
      const arr=bio===B.FOREST?spots.dec:spots.pine;
      if(arr.length<7000)arr.push({x,z,s:1.0+nj(cx+t,cz-t)*1.0});
    }
  }
  G.decid=new THREE.InstancedMesh(decidG,new THREE.MeshLambertMaterial({color:0x4c7a3c}),Math.max(1,spots.dec.length));
  G.pine=new THREE.InstancedMesh(pineG,new THREE.MeshLambertMaterial({color:0x2e5138}),Math.max(1,spots.pine.length));
  spots.dec.forEach((t,i)=>setInst(G.decid,i,t.x,hAt(t.x,t.z),t.z,t.x,t.s,t.s,t.s));
  spots.pine.forEach((t,i)=>setInst(G.pine,i,t.x,hAt(t.x,t.z),t.z,t.x,t.s,t.s*1.1,t.s));
  G.decid.instanceMatrix.needsUpdate=true;G.pine.instanceMatrix.needsUpdate=true;
  G.decid.castShadow=G.pine.castShadow=true;
  scene.add(G.decid);scene.add(G.pine);
}

function gableGeom(){

     0.5,0, 0.5,  0.5,1,0, -0.5,1,0,    0.5,0, 0.5, -0.5,1,0, -0.5,0, 0.5, // back slope
    -0.5,0,-0.5, -0.5,0,0.5, -0.5,1,0,                                      // left cap
     0.5,0, 0.5,  0.5,0,-0.5, 0.5,1,0 ];                                    // right cap
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.Float32BufferAttribute(p,3));

}

function updateBuildingInstance(b){
  const i=b.idx;if(i===undefined)return;
  let h=b.h,col,roofCol;
  if(b.state==='burning'){col=0x4a3020;roofCol=0x30201a;}
  else if(b.state==='ruin'||b.state==='rubble'){col=0x3a3430;roofCol=0x2c2824;h=b.h*0.35;}
  else{col=PAL.tierWall[b.tier];roofCol=PAL.tierRoof[b.tier];
    if(b.arch==='temple'){col=0xcfc7b4;}
    if(b.arch==='keep'||b.arch==='tower'){col=0x9a948a;}}
  setInst(G.bodies,i,b.x,b.y,b.z,b.rot,b.w,h,b.d);
  G.bodies.setColorAt(i,C1.setHex(col));
  const ruined=b.state==='ruin'||b.state==='rubble';
  if(b.roof===0&&!ruined){
    setInst(G.roofs,i,b.x,b.y+h,b.z,b.rot,b.w*1.18,h*0.62,b.d*1.18);
  }else if(b.roof===2&&!ruined){
    setInst(G.roofs,i,b.x,b.y+h,b.z,b.rot,b.w*1.1,h*0.9,b.d*1.1);
  }else{
    setInst(G.roofs,i,0,-500,0,0,0.01,0.01,0.01);
  }
  G.roofs.setColorAt(i,C1.setHex(roofCol));
  G.bodies.instanceMatrix.needsUpdate=true;G.roofs.instanceMatrix.needsUpdate=true;
  if(G.bodies.instanceColor)G.bodies.instanceColor.needsUpdate=true;
  if(G.roofs.instanceColor)G.roofs.instanceColor.needsUpdate=true;
}
function addBuildingLive(s){ // growth: new building appears
  const dirs=[rand('sim')*Math.PI*2,rand('sim')*Math.PI*2,rand('sim')*Math.PI*2];
  for(let t=0;t<30;t++){
    const dir=pick('sim',dirs),d=s.radius*0.4+rand('sim')*s.radius*0.75;
    const x=s.pos.x+Math.cos(dir)*d,z=s.pos.z+Math.sin(dir)*d;
    const ci=toCell(x),cj=toCell(z);
    if(W.water[cIdx(ci,cj)]||slopeAt(ci,cj)>0.3)continue;
    if(s.buildings.some(b=>dist2d(x,z,b.x,b.z)<11))continue;
    const arch=pick('sim',['house','house','house','shop','longhouse']);
    const a=ARCH[arch];
    const b={arch,tier:chance('sim',0.3)?1:0,x,z,rot:dir,w:a[0],d:a[1],h:a[2],roof:a[3],
      district:'residential',state:'sound',s,y:hAt(x,z),burnT:0,rebuildT:0,idx:G.bldList.length};
    if(b.idx>=G.bodies.count)return null;
    s.buildings.push(b);G.bldList.push(b);
    updateBuildingInstance(b);
    return b;
  }
  return null;
}

let overlayMode=null;
function setOverlay(mode){
  overlayMode=(overlayMode===mode)?null:mode;
  if(G.overlay){scene.remove(G.overlay);G.overlay.traverse(o=>{if(o.geometry)o.geometry.dispose();});G.overlay=null;}
  document.querySelectorAll('.ovbtn').forEach(b=>b.classList.toggle('on',b.dataset.o===overlayMode));
  if(!overlayMode)return;
  refreshOverlay();
}
function refreshOverlay(){
  if(!overlayMode)return;
  if(G.overlay){scene.remove(G.overlay);G.overlay.traverse(o=>{if(o.geometry)o.geometry.dispose();});}
  const grp=new THREE.Group();
  const disc=(s,color,op,rad)=>{
    const m=new THREE.Mesh(new THREE.CircleGeometry(rad||s.radius*2.2,24),
      new THREE.MeshBasicMaterial({color,transparent:true,opacity:op,depthWrite:false}));
    m.rotation.x=-Math.PI/2;m.position.set(s.pos.x,s.pos.y+4+(s.radius*0.01),s.pos.z);
    grp.add(m);
  };
  if(overlayMode==='territory'){
    for(const s of W.settlements){
      const h=W.houses[s.owner];
      disc(s,h?h.sigilHue[0]:0x888888,0.32,s.kind==='capital'?800:s.kind==='town'?600:380);
    }
  }else if(overlayMode==='trade'){
    for(const r of W.roads){
      const pts=r.path.map(p=>new THREE.Vector3(p.x,hAt(p.x,p.z)+4,p.z));
      const g=new THREE.BufferGeometry().setFromPoints(pts);
      const vol=clamp((r.vol||0)/6,0.15,1);
      grp.add(new THREE.Line(g,new THREE.LineBasicMaterial({color:0xC9A227,transparent:true,opacity:vol})));
    }
  }else if(overlayMode==='prosperity'){
    for(const s of W.settlements)disc(s,new THREE.Color().setHSL(clamp(s.prosperity/100,0,1)*0.33,0.8,0.5).getHex(),0.4);
  }else if(overlayMode==='plague'){
    for(const s of W.settlements){const f=s.pop>0?s.infected/s.pop:0;disc(s,f>0.001?0x7a2090:0x2a6030,clamp(0.15+f*2.5,0.15,0.7));}
  }else if(overlayMode==='unrest'){
    for(const s of W.settlements)disc(s,new THREE.Color().setHSL((1-clamp(s.unrest/100,0,1))*0.33,0.85,0.45).getHex(),0.4);
  }
  G.overlay=grp;scene.add(grp);
}

/* =========================================================================
   CAMERA — one smoothed spring-damper rig; free / follow / director modes
   ========================================================================= */
const cam={
  focus:new THREE.Vector3(0,0,0),yaw:0.8,dist:2600,pitchBias:0,
  cur:{focus:new THREE.Vector3(0,0,0),yaw:0.8,dist:2600,pitchBias:0},
  mode:'free',follow:null,manualUntil:0,shake:0
};
function pitchForDist(d){ // curved altitude path: high = map-like, low = street-like
  const t=clamp((Math.log(d)-Math.log(8))/(Math.log(4000)-Math.log(8)),0,1);
  return lerp(0.14,1.22,Math.pow(t,0.8));
}
function flyTo(x,z,d,yaw){
  cam.focus.set(x,hAt(x,z),z);
  if(d)cam.dist=clamp(d,6,4200);
  if(yaw!==undefined)cam.yaw=yaw;
  cam.follow=null;cam.mode=cam.mode==='director'?'director':'free';
}
function updateCamera(dt,now){
  if(cam.follow){
    const t=cam.follow;
    if(t.gone||(t.alive===false)){cam.follow=null;}
    else{
      const p=agentPos(t);
      if(p){cam.focus.set(p.x,p.y??hAt(p.x,p.z),p.z);if(cam.dist>900)cam.dist=300;}
      else cam.follow=null;
    }
  }
  const k=1-Math.exp(-dt*3.2);
  cam.cur.focus.lerp(cam.focus,k);
  let dy=cam.yaw-cam.cur.yaw;
  while(dy>Math.PI)dy-=Math.PI*2;while(dy<-Math.PI)dy+=Math.PI*2;
  cam.cur.yaw+=dy*k;
  cam.cur.dist=lerp(cam.cur.dist,cam.dist,k);
  cam.cur.pitchBias=lerp(cam.cur.pitchBias,cam.pitchBias,k);
  const pitch=clamp(pitchForDist(cam.cur.dist)+cam.cur.pitchBias,0.08,1.45);
  const d=cam.cur.dist;
  const fx=cam.cur.focus.x,fz=cam.cur.focus.z;
  const fy=Math.max(cam.cur.focus.y,hAt(fx,fz));
  let px=fx+Math.cos(cam.cur.yaw)*Math.cos(pitch)*d;
  let pz=fz+Math.sin(cam.cur.yaw)*Math.cos(pitch)*d;
  let py=fy+Math.sin(pitch)*d;
  const ground=hAt(px,pz)+5;
  if(py<ground)py=ground;
  if(cam.shake>0){
    px+=(Math.random()-0.5)*cam.shake;py+=(Math.random()-0.5)*cam.shake;pz+=(Math.random()-0.5)*cam.shake;
    cam.shake=Math.max(0,cam.shake-dt*22);
  }
  camera.position.set(px,py,pz);
  camera.lookAt(fx,fy,fz);
}
function agentPos(t){
  if(t.pos&&t.pos.x!==undefined&&!t.path)return {x:t.pos.x,y:(t.pos.y??hAt(t.pos.x,t.pos.z))+20,z:t.pos.z};
  if(t._rpos)return t._rpos;
  return null;
}

/* ---------------- input ---------------------------------------------------- */
let placeMode=null, hoverPick=null;
function markManual(){cam.manualUntil=perfNow()+30;if(cam.mode==='director')cam.mode='free';}
function perfNow(){return performance.now()/1000;}
function initInput(){
  const el=renderer.domElement;
  let drag=null;
  el.addEventListener('contextmenu',e=>e.preventDefault());
  el.addEventListener('pointerdown',e=>{
    drag={x:e.clientX,y:e.clientY,b:e.button,moved:false,shift:e.shiftKey};
    el.setPointerCapture(e.pointerId);
  });
  el.addEventListener('pointermove',e=>{
    if(!drag)return;
    const dx=e.clientX-drag.x,dy=e.clientY-drag.y;
    if(Math.abs(dx)+Math.abs(dy)>4)drag.moved=true;
    if(!drag.moved)return;
    markManual();
    if(drag.b===0&&!drag.shift){ // orbit
      cam.yaw+=dx*0.006;
      cam.pitchBias=clamp(cam.pitchBias-dy*0.003,-0.6,0.5);
    }else{ // pan
      const sc=cam.cur.dist*0.0016;
      const cy=Math.cos(cam.cur.yaw),sy=Math.sin(cam.cur.yaw);
      cam.focus.x+=(dx*sy-dy*cy)*sc*-1;
      cam.focus.z+=(-dx*cy-dy*sy)*sc*-1;
      cam.focus.x=clamp(cam.focus.x,-SIZE*0.7,SIZE*0.7);
      cam.focus.z=clamp(cam.focus.z,-SIZE*0.7,SIZE*0.7);
      cam.focus.y=hAt(cam.focus.x,cam.focus.z);
      cam.follow=null;
    }
    drag.x=e.clientX;drag.y=e.clientY;
  });
  el.addEventListener('pointerup',e=>{
    if(drag&&!drag.moved&&e.button===0)onClick(e);
    drag=null;
  });
  el.addEventListener('wheel',e=>{
    e.preventDefault();markManual();
    cam.dist=clamp(cam.dist*Math.exp(e.deltaY*0.0011),6,4200);
  },{passive:false});
  window.addEventListener('keydown',e=>{
    if(e.target.tagName==='INPUT'&&e.target.type==='text')return;
    switch(e.key){
      case ' ':e.preventDefault();setSpeed(speedIdx===0?lastSpeed||2:0);break;
      case '1':setSpeed(1);break;case '2':setSpeed(2);break;case '3':setSpeed(3);break;case '4':setSpeed(4);break;
      case 'h':case 'H':document.body.classList.toggle('hideui');break;
      case 'c':case 'C':toggleWatch();break;
      case 'm':case 'M':toggleMap();break;
      case 'Escape':
        if(placeMode)setPlaceMode(null);
        else{hideInspect();cam.follow=null;}
        break;
    }
  });
}
const raycaster=new THREE.Raycaster();
function groundPoint(e){
  const m=new THREE.Vector2((e.clientX/innerWidth)*2-1,-(e.clientY/innerHeight)*2+1);
  raycaster.setFromCamera(m,camera);
  const hit=raycaster.intersectObject(G.terrain)[0];
  return hit?hit.point:null;
}
function onClick(e){
  if(placeMode){
    const p=groundPoint(e);
    if(p)doAct(placeMode,p);
    setPlaceMode(null);
    return;
  }
  const m=new THREE.Vector2((e.clientX/innerWidth)*2-1,-(e.clientY/innerHeight)*2+1);
  raycaster.setFromCamera(m,camera);
  const targets=[...G.pickS,G.dragonMesh,...G.cairns,...W.armies.filter(a=>a.flag).map(a=>a.flag),G.bodies];
  for(const c of W.caravans)if(c.proxy)targets.push(c.proxy);
  const hits=raycaster.intersectObjects(targets,true);
  for(const h of hits){
    let o=h.object,pk=null;
    while(o&&!pk){pk=o.userData.pick;o=o.parent;}
    if(h.object===G.bodies&&h.instanceId!==undefined&&h.instanceId<G.bldList.length)
      pk={type:'building',b:G.bldList[h.instanceId]};
    if(pk){showInspect(pk);return;}
  }
  hideInspect();
  if(cam.follow){cam.follow=null;}
}
function setPlaceMode(mode){
  placeMode=mode;
  document.getElementById('placehint').style.display=mode?'block':'none';
}

function flyToBtn(fb,label,fn){fb.style.display='block';fb.textContent=label;fb.onclick=fn;}

function sigURL(hi){
