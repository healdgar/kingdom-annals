/* =========================================================================
   SIMULATION — one tick = one sim-day. Weather → Economy → Population →
   Politics → Military → Threats → Growth → Chronicle flush.
   Every positive feedback loop ships with a predator.
   ========================================================================= */
MOD={harvest:1,birth:1,mort:1,trade:1,tax:12,vir:1,leth:1,disaster:1,bandit:1,aggr:1,fert:1,myth:1};
let speedIdx=2,lastSpeed=2;
const day=()=>W.clock.day;
const year=()=>Math.floor(W.clock.day/360)+1;
const seasonIdx=()=>Math.floor((W.clock.day%360)/90);
const seasonDay=()=>Math.floor(W.clock.day%90)+1;
function dateStr(d){
  d=d??W.clock.day;
  return SEASONS[Math.floor((d%360)/90)]+' '+(Math.floor(d%90)+1)+', Year '+(Math.floor(d/360)+1);
}
function ordinal(n){return n+(['th','st','nd','rd'][((n%100/10|0)!==1&&n%10<4)?n%10:0]||'th');}
function mythMult(){return W.comet&&W.comet.teeth&&day()<W.comet.until?2:1;}

function simInit(){
  // resource bases per settlement
  for(const s of W.settlements){
    let farm=0,forest=0,ore=0;
    for(let dz=-5;dz<=5;dz++)for(let dx=-5;dx<=5;dx++){
      if(!inB(s.cx+dx,s.cz+dz))continue;const b=W.biome[cIdx(s.cx+dx,s.cz+dz)];
      if(b===B.FARM)farm++;if(b===B.FOREST||b===B.PINE)forest++;if(b===B.ROCK)ore++;
    }
    s.res={farm,forest,ore:Math.min(ore,14),fish:(s.harbor?12:0)+(s.river?5:0)};
    // nearest river cell, for barge landings
    s.rivCell=null;
    if(s.river){
      let bd=1e9;
      for(let dz=-6;dz<=6;dz++)for(let dx=-6;dx<=6;dx++){
        const ci=s.cx+dx,cj=s.cz+dz;
        if(!inB(ci,cj)||W.water[cIdx(ci,cj)]!==2)continue;
        const d=dx*dx+dz*dz;if(d<bd){bd=d;s.rivCell=cIdx(ci,cj);}
      }
    }
  }
  // the river is a road that flows: barge routes between river-linked towns
  W.riverPairs=[];
  for(let i=0;i<W.settlements.length;i++)for(let j=i+1;j<W.settlements.length;j++){
    if(!W.settlements[i].river||!W.settlements[j].river)continue;
    const r=riverRoute(i,j);
    if(r&&r.len>400)W.riverPairs.push({a:i,b:j,route:r});
  }
}

/* ============================ WEATHER ==================================== */
function tickWeather(){
  const w=W.weather,si=seasonIdx();
  w.t--;
  if(w.t<=0){
    const r=rand('sim');
    const rainy=si===0?0.32:si===1?0.18:si===2?0.3:0.24;
    if(r<rainy*(W.drought?0.35:1))w.state=si===3?'snow':(chance('sim',0.25)?'storm':'rain');
    else if(r<rainy+0.24)w.state='overcast';
    else w.state='clear';
    w.t=2+randi('sim',5);
    w.wind+=(rand('sim')-0.5)*1.2;
  }
  if(si===3&&(w.state==='snow'||w.state==='storm'))W.snowpack=Math.min(100,W.snowpack+3);
  if(si!==3)W.snowpack=Math.max(0,W.snowpack-(si===0?2.2:1));
  if(W.flooding>0)W.flooding--;
  if(W.eclipse>0)W.eclipse-=1;
}

/* ============================ ECONOMY ==================================== */
const NEED={grain:0.007,fish:0.003,timber:0.0006,ore:0.0002,tools:0.0004,cloth:0.0005,wine:0.0004};
function price(s,g){
  const need=s.pop*NEED[g]*25+5;
  return GOODBASE[g]*clamp(need/(s.stores[g]+2),0.3,4);
}
function tickEconomy(){
  const si=seasonIdx(),seasonF=[0.7,1.1,1.6,0.08][si];
  for(const s of W.settlements){
    const workF=clamp(s.pop/(s.pop+s.plagueDead+1),0.4,1)*(s.siegeBy?0.15:1);
    s.stores.grain+=s.res.farm*0.92*seasonF*MOD.harvest*(W.drought?0.35:1)*workF;
    s.stores.fish+=s.res.fish*0.8*workF;
    s.stores.timber+=s.res.forest*0.05*workF;
    s.stores.ore+=s.res.ore*0.05*workF;
    if(s.kind!=='village'){ // craft conversion
      const c=Math.min(s.stores.ore,s.stores.timber,1.4);
      s.stores.ore-=c*0.6;s.stores.timber-=c*0.6;s.stores.tools+=c*0.8;
    }
    if(s.kind==='capital'){s.stores.cloth+=0.9;s.stores.wine+=0.7;}
    for(const g of GOODS){
      s.stores[g]-=s.pop*NEED[g]*(g==='grain'||g==='fish'?0:1); // food eaten in population tick
      s.stores[g]=clamp(s.stores[g],0,s.pop*NEED[g]*220+400);
    }
    // taxes on production
    W.treasury+=s.pop*0.0016*(MOD.tax/12)*(s.prosperity/60);
  }
  // caravans
  if(W.caravans.length<Math.round(30*MOD.trade)&&day()%2===0){
    for(let attempt=0;attempt<3;attempt++){
      const oi=randi('sim',W.settlements.length),o=W.settlements[oi];
      if(o.infected/Math.max(1,o.pop)>0.15||o.siegeBy)continue;
      let best=null;
      for(let di=0;di<W.settlements.length;di++){
        if(di===oi)continue;const d=W.settlements[di];
        if(d.infected/Math.max(1,d.pop)>0.15||d.siegeBy)continue; // emergent quarantine
        for(const g of GOODS){
          const margin=price(d,g)-price(o,g);
          if(margin>GOODBASE[g]*0.5&&o.stores[g]>40){
            const r=route(oi,di);if(!r)continue;
            const score=margin/Math.max(600,r.len);
            if(!best||score>best.score)best={score,di,g,r};
          }
        }
      }
      if(best){
        const o2=W.settlements[oi],dd=W.settlements[best.di];
        const qty=Math.min(o2.stores[best.g]*0.4,60);
        o2.stores[best.g]-=qty;
        const c={origin:oi,dest:best.di,good:best.g,qty,value:qty*price(dd,best.g),
          poly:best.r.poly,len:best.r.len,departDay:day(),arriveDay:day()+best.r.len/1000,robbed:false,
          proxy:null,sea:false};
        W.caravans.push(c);
        const rr=W.roads.find(r=>(r.a===oi&&r.b===best.di)||(r.a===best.di&&r.b===oi));
        if(rr)rr.vol=(rr.vol||0)+1;
        break;
      }
    }
  }
  // ambient market traffic keeps the roads alive even without arbitrage gaps
  for(let amb=0;amb<2;amb++){
    if(W.caravans.length>=Math.round(26*MOD.trade)||!chance('sim',0.5*MOD.trade))continue;
    const oi=randi('sim',W.settlements.length);let di=randi('sim',W.settlements.length);
    if(oi!==di){
      const o=W.settlements[oi],d2=W.settlements[di];
      if(o.infected/Math.max(1,o.pop)<=0.15&&d2.infected/Math.max(1,d2.pop)<=0.15&&!o.siegeBy&&!d2.siegeBy){
        const g=GOODS.reduce((a,b)=>o.stores[a]>o.stores[b]?a:b);
        if(o.stores[g]>25){
          const r=route(oi,di);
          if(r){
            const qty=Math.min(o.stores[g]*0.25,40);o.stores[g]-=qty;
            W.caravans.push({origin:oi,dest:di,good:g,qty,value:qty*price(d2,g),poly:r.poly,len:r.len,
              departDay:day(),arriveDay:day()+r.len/1000,robbed:false,sea:false,proxy:null});
            const rr=W.roads.find(r2=>(r2.a===oi&&r2.b===di)||(r2.a===di&&r2.b===oi));
            if(rr)rr.vol=(rr.vol||0)+0.5;
          }
        }
      }
    }
  }
  // river barges between river-linked settlements (faster and safer than the road)
  if(W.riverPairs&&W.riverPairs.length&&W.caravans.filter(c=>c.river).length<5&&chance('sim',0.4*MOD.trade)){
    const pr=pick('sim',W.riverPairs);
    const downstream=chance('sim',0.5);
    const oi=downstream?pr.a:pr.b,di=downstream?pr.b:pr.a;
    const o=W.settlements[oi],d2=W.settlements[di];
    if(o.infected/Math.max(1,o.pop)<=0.15&&d2.infected/Math.max(1,d2.pop)<=0.15&&!o.siegeBy&&!d2.siegeBy){
      const g=GOODS.reduce((a,b)=>o.stores[a]>o.stores[b]?a:b);
      if(o.stores[g]>25){
        const qty=Math.min(o.stores[g]*0.3,70);o.stores[g]-=qty;
        const poly=downstream?pr.route.poly:[...pr.route.poly].reverse();
        W.caravans.push({origin:oi,dest:di,good:g,qty,value:qty*price(d2,g),poly,len:pr.route.len,
          departDay:day(),arriveDay:day()+pr.route.len/1500,robbed:false,sea:false,river:true,proxy:null});
      }
    }
  }
  // cogs between harbors
  const harbors=W.settlements.map((s,i)=>s.harbor?i:-1).filter(i=>i>=0);
  if(harbors.length>=2&&W.caravans.filter(c=>c.sea).length<6&&chance('sim',0.3*MOD.trade)){
    const ai=pick('sim',harbors);let bi=pick('sim',harbors);
    if(ai!==bi){
      const a=W.settlements[ai],b=W.settlements[bi];
      const g=pick('sim',['fish','grain','cloth','wine']);
      if(a.stores[g]>50){
        const qty=Math.min(a.stores[g]*0.4,90);a.stores[g]-=qty;
        const poly=[{x:a.pos.x,z:a.pos.z},{x:(a.pos.x+b.pos.x)/2+(rand('sim')-0.5)*600,z:(a.pos.z+b.pos.z)/2+(rand('sim')-0.5)*600},{x:b.pos.x,z:b.pos.z}];
        const len=dist2d(a.pos.x,a.pos.z,b.pos.x,b.pos.z)*1.2;
        W.caravans.push({origin:ai,dest:bi,good:g,qty,value:qty*price(b,g),poly,len,departDay:day(),arriveDay:day()+len/1600,robbed:false,sea:true});
      }
    }
  }
  // arrivals
  for(let i=W.caravans.length-1;i>=0;i--){
    const c=W.caravans[i];
    if(day()>=c.arriveDay){
      const d=W.settlements[c.dest];
      if(!c.robbed){
        d.stores[c.good]+=c.qty;
        const profit=c.value*0.35;
        W.treasury+=profit*(MOD.tax/100);
        d.prosperity=clamp(d.prosperity+0.4,0,100);
        W.settlements[c.origin].prosperity=clamp(W.settlements[c.origin].prosperity+0.3,0,100);
        // plague travels the trade network
        const o=W.settlements[c.origin];
        if(o.infected/Math.max(1,o.pop)>0.02&&d.infected<1&&chance('sim',0.35*MOD.vir)){
          d.infected+=3;
          emit('fates',7,d.pos,`The pestilence has come to ${d.name}, borne on the ${c.sea?'tide':'road'} from ${o.name}.`);
        }
      }
      if(c.proxy){scene.remove(c.proxy);c.proxy=null;}
      c.gone=true;
      W.caravans.splice(i,1);
    }
  }
  for(const r of W.roads)r.vol=(r.vol||0)*0.995;
  // treasury upkeep drains — the predator on hoarding
  W.treasury-=W.armies.length*14;
  W.treasury-=W.settlements.reduce((t,s)=>t+s.garrison,0)*0.012;
  if(W.treasury>15000)W.treasury-=(W.treasury-15000)*0.0012; // the court's splendor grows to meet the coin
  W.treasury=Math.max(-500,W.treasury);
}

/* ============================ POPULATION ================================= */
function tickPopulation(){
  for(const s of W.settlements){
    const foodNeed=s.pop*(NEED.grain+NEED.fish);
    let got=Math.min(s.stores.grain,foodNeed*0.75);s.stores.grain-=got;
    const fishGot=Math.min(s.stores.fish,foodNeed-got);s.stores.fish-=fishGot;got+=fishGot;
    const hunger=foodNeed>0?clamp(1-got/foodNeed,0,1):0;
    s.hunger=hunger;
    const births=s.pop*(0.042/360)*MOD.birth*clamp(s.prosperity/55,0.4,1.5)*(1-hunger*0.7);
    const deaths=s.pop*(0.026/360)*MOD.mort*(1+hunger*5)*(s.siegeBy?1.5:1);
    s.pop=Math.max(5,s.pop+births-deaths);
    s.unrest=clamp(s.unrest+hunger*1.6+(MOD.tax-12)*0.012-(s.festivalUntil>day()?0.5:0)-0.14,0,100);
    s.prosperity=clamp(s.prosperity+(hunger>0.25?-0.35:0.06)-(s.siegeBy?0.5:0),1,100);
    if(hunger>0.4&&!s.famineFlag&&s.pop>100){
      s.famineFlag=true;
      emit('trade',7,s.pos,`Famine stalks ${s.name}; the granaries stand empty and the ${['young','old','poor'][randi('sim',3)]} perish first.`);
      W.legitimacy=clamp(W.legitimacy-4,0,100);
    }
    if(hunger<0.15)s.famineFlag=false;
    // migration under misery
    if((hunger>0.3||s.unrest>65)&&s.pop>60){
      const to=W.settlements.filter(o=>o!==s&&(o.hunger||0)<0.1).sort((a,b)=>b.prosperity-a.prosperity)[0];
      if(to){const flee=s.pop*0.002;s.pop-=flee;to.pop+=flee;} // nobody vanishes into thin air
    }
    // plague SIR
    if(s.infected>0.3){
      const N=Math.max(1,s.pop),beta=0.22*MOD.vir,gamma=0.075;
      const Sf=Math.max(0,N-s.infected-s.recovered);
      const newInf=beta*Sf*s.infected/N;
      const rec=gamma*s.infected;
      const dead=rec*0.28*MOD.leth;
      s.infected=Math.max(0,s.infected+newInf-rec);
      s.recovered+=rec-dead;
      s.plagueDead+=dead;s.pop=Math.max(5,s.pop-dead);
      s.pyres=s.infected/N>0.04;
      s.unrest=clamp(s.unrest+s.infected/N*1.2,0,100);
      if(s.infected<0.5){s.infected=0;s.pyres=false;
        if(s.plagueDead>30)emit('fates',6,s.pos,`The pestilence loosens its grip on ${s.name}. ${Math.round(s.plagueDead)} souls were carried to the pyres.`);
        s.recovered*=0.5;s.plagueDead=0;
      }
    }
  }
  W.plagueActive=W.settlements.some(s=>s.infected>0.5);
}

/* ============================ POLITICS =================================== */
function ageOf(n){return Math.floor((day()-n.birthDay)/360);}
function tickPolitics(){
  W.legitimacy=clamp(W.legitimacy+(55-W.legitimacy)*0.0012,0,100);
  const avgUnrest=W.settlements.reduce((t,s)=>t+s.unrest,0)/W.settlements.length;
  for(let hi=1;hi<W.houses.length;hi++){
    const h=W.houses[hi];if(h.exiled)continue;
    let drift=(52-h.loyalty)*0.0018;
    drift-=(MOD.tax-12)*0.0035*MOD.aggr;
    drift-=avgUnrest*0.0012*MOD.aggr;
    drift+=(W.legitimacy-50)*0.0012;
    const m=W.monarch;
    if(m&&m.alive){
      if(m.traits.includes('cruel'))drift-=0.011;
      if(m.traits.includes('dull'))drift-=0.005;
      if(m.traits.includes('just'))drift+=0.006;
      if(m.traits.includes('generous'))drift+=0.004;
    }
    if(h.might>1.1)drift-=0.005; // strong houses chafe under any crown
    h.loyalty=clamp(h.loyalty+drift,0,100);
    // slights and grudges — the spark supply for civil war
    if(chance('sim',0.001*MOD.aggr)){
      h.loyalty=clamp(h.loyalty-(8+randi('sim',12)),0,100);
      const seatPos=W.settlements[h.seat]?.pos||W.capital.pos;
      emit('crown',4,seatPos,pick('sim',[
        `${h.name} is passed over for the office of Warden of the Marches; its lord leaves court without taking leave.`,
        `A hunting dispute on the borders of ${nearestPlaceName(seatPos.x,seatPos.z)} ends in drawn steel; ${h.name} nurses the insult.`,
        `The crown seizes a contested toll-bridge claimed by ${h.name}. Harsh words are spoken in the hall.`,
        `At the feast, the herald seats ${h.name} below the salt. The slight is not forgotten.`]));
    }else if(h.loyalty<35&&W.treasury>3000&&chance('sim',0.004)){
      W.treasury-=600;h.loyalty=clamp(h.loyalty+12,0,100);
      emit('crown',4,W.capital.pos,`Seeking peace at home, the crown grants lands and offices to ${h.name}; old wounds are salved with gold.`);
    }
  }
  // riots & revolts
  for(const s of W.settlements){
    if(s.unrest>72&&chance('sim',0.02)){
      s.unrest-=14;s.prosperity=clamp(s.prosperity-3,1,100);
      emit('fates',5,s.pos,`Riot in ${s.name}! The mob overturns the market stalls and cries against the crown.`);
      if(chance('sim',0.3))igniteFire(s,1,'riot');
    }
    if(s.unrest>90&&!s.revolted&&s.owner===0&&s.kind!=='capital'&&chance('sim',0.05)){
      let nh=0,bd=1e18;
      W.houses.forEach((h,hi)=>{if(hi&&!h.exiled){const d=dist2d(s.pos.x,s.pos.z,W.settlements[h.seat].pos.x,W.settlements[h.seat].pos.z);if(d<bd){bd=d;nh=hi;}}});
      if(nh){s.owner=nh;s.revolted=true;s.unrest=45;
        emit('war',8,s.pos,`${s.name} rises in revolt and hoists the banner of ${W.houses[nh].name}!`);
        refreshOverlay();
      }
    }
  }
  // notables: birthdays, deaths, births, marriages
  for(const n of W.notables){
    if(!n.alive)continue;
    if((day()-n.birthDay)%360===0&&day()>n.birthDay){
      n.age=ageOf(n);
      let q=n.age<50?0.006:(n.age-44)*0.007;
      if(n.traits.includes('sickly'))q*=2.6;
      if(W.plagueActive)q*=1.5;
      if(chance('sim',q*mythMult()))killNotable(n,pick('sim',['of a sudden fever','of the flux','in a fall from horseback','of a wound gone sour','peacefully, abed','choking at the feast']));
    }
  }
  // births — the cast stays a cast, not a census (~140 living notables)
  if(day()%9===0){
    const aliveCount=W.notables.filter(x=>x.alive).length;
    for(const n of W.notables){
      if(aliveCount>=140)break;
      if(!n.alive||n.sex!=='f'||!n.spouse)continue;
      const sp=notableById(n.spouse);if(!sp||!sp.alive)continue;
      if(n.age>=18&&n.age<=44){
        let p=0.006*(n.house===0||sp.house===0?MOD.fert:1);
        if(n.traits.includes('fertile'))p*=1.6;
        if(chance('sim',p)){
          const ks=chance('sim',0.5)?'m':'f';
          const parent=sp.role==='monarch'||sp.role==='head'?sp:n;
          const kid=mkNotable({name:personName(ks),sex:ks,age:0,birthDay:day(),house:parent.house,
            role:parent.role==='monarch'?'heir':'scion',traits:twoTraits(),agenda:'is yet in swaddling'});
          parent.heirs.push(kid.id);
          if(parent.role==='monarch')
            emit('crown',7,W.capital.pos,`A ${ks==='f'?'daughter':'son'} is born to ${fullTitle(parent)} — the ${ks==='f'?'princess':'prince'} ${kid.name}. Bells ring in ${W.capital.name}.`);
          else if(chance('sim',0.4))
            emit('crown',3,W.settlements[houseOf(parent).seat]?.pos||W.capital.pos,`${houseOf(parent).name} welcomes a ${ks==='f'?'daughter':'son'}, ${kid.name}.`);
        }
      }
    }
  }
  // arranged marriages for alliance value
  if(day()%37===0){
    const single=W.notables.filter(n=>n.alive&&!n.spouse&&ageOf(n)>=17&&ageOf(n)<=45&&(n.role==='heir'||n.role==='scion'||n.role==='cousin'));
    for(const a of single){
      const b=single.find(b2=>b2!==a&&b2.sex!==a.sex&&b2.house!==a.house&&!b2._just);
      if(b&&chance('sim',0.35)){
        a.spouse=b.id;b.spouse=a.id;a._just=b._just=true;
        const royal=a.house===0||b.house===0;
        const other=W.houses[a.house===0?b.house:a.house];
        if(royal&&other){other.loyalty=clamp(other.loyalty+10,0,100);}
        if(royal||chance('sim',0.3))
          emit('crown',royal?6:3,W.capital.pos,
            `${fullTitle(a)} of ${houseOf(a).name} is wed to ${fullTitle(b)} of ${houseOf(b).name}${royal?'; the match binds the houses in friendship':''}. There is feasting ${royal?'for three days':'in the hall'}.`,{festival:royal});
        if(royal)W.capital.festivalUntil=day()+3;
        break;
      }
    }
    W.notables.forEach(n=>delete n._just);
  }
  // an exiled house's seat does not stay empty forever: new blood is raised to the peerage
  if(day()%97===0){
    const exiledIdx=W.houses.findIndex((h,i)=>i>0&&h.exiled&&day()-(h.exiledDay||0)>7*360);
    if(exiledIdx>0&&chance('sim',0.3)){
      const h=W.houses[exiledIdx];
      const beasts=['Stag','Wolf','Raven','Heron','Boar','Ox','Falcon','Adder'];
      h.name='House '+(chance('sim',0.5)?pick('sim',NAMEB.pfx)+pick('sim',NAMEB.sfx):pick('sim',beasts)+pick('sim',['mane','fell','marck','wood','helm']));
      h.charge=pick('sim',CHARGES);h.exiled=false;h.loyalty=68;h.might=0.6+rand('sim')*0.7;h.grudges={};
      delete h._url;
      const sx=chance('sim',0.5)?'m':'f';
      const head=mkNotable({name:personName(sx),sex:sx,age:32+randi('sim',15),house:exiledIdx,role:'head',
        traits:twoTraits(),agenda:'means to prove the new blood worthy'});
      head.birthDay=day()-head.age*360;
      h.head=head.id;
      const sp=mkNotable({name:personName(sx==='m'?'f':'m'),sex:sx==='m'?'f':'m',age:26+randi('sim',15),house:exiledIdx,role:'spouse',traits:twoTraits()});
      sp.birthDay=day()-sp.age*360;
      head.spouse=sp.id;sp.spouse=head.id;
      const seatPos=W.settlements[h.seat]?.pos||W.capital.pos;
      emit('crown',6,seatPos,`The crown raises new blood to the peerage: ${fullTitle(head)} is granted the forfeit seat of ${W.settlements[h.seat]?.name||'the marches'}, and ${h.name} is entered in the rolls.`);
      refreshHousePanel();
    }
  }
  // succession crisis / civil war spark
  checkWarSpark();
  // festivals
  if(W.clock.day%360===185&&!W.drought&&W.capital.hunger<0.15){
    W.capital.festivalUntil=day()+4;
    W.settlements.forEach(s=>s.unrest=clamp(s.unrest-6,0,100));
    emit('crown',3,W.capital.pos,`The Feast of High Summer is held in ${W.capital.name}; there are games, and a great ox is roasted whole.`,{festival:true});
  }
  if(W.clock.day%360===230&&!W.drought){
    emit('trade',3,W.capital.pos,`The harvest is brought in ${MOD.harvest>1.2?'heavy and golden':'in good order'}; tithes fill the granaries.`,{festival:true});
    W.legitimacy=clamp(W.legitimacy+1,0,100);
  }
}
function killNotable(n,cause,silent){
  if(!n.alive)return;
  n.alive=false;n.deathDay=day();
  const wasMonarch=n===W.monarch;
  const h=houseOf(n);
  if(!silent){
    const pos=n.house===0?W.capital.pos:(W.settlements[h.seat]?.pos||W.capital.pos);
    const pri=wasMonarch?10:n.role==='head'?7:n.role==='heir'?6:2;
    if(pri>2||n.epithet||chance('sim',0.22))
      emit('crown',pri,pos,`${fullTitle(n)}${n.house>0&&n.role!=='head'?' of '+houseOf(n).name:''} has died ${cause}, in the ${ordinal(Math.max(1,n.age||ageOf(n)))} year of ${n.sex==='f'?'her':'his'} age.`);
  }
  if(n.spouse){const sp=notableById(n.spouse);if(sp)sp.spouse=null;}
  if(wasMonarch)succession();
  else if(n.role==='head'&&h){
    const heir=n.heirs.map(notableById).find(k=>k&&k.alive&&ageOf(k)>=16);
    if(heir){heir.role='head';h.head=heir.id;heir.agenda=n.agenda;}
    else{const any=W.notables.find(m=>m.alive&&m.house===n.house&&ageOf(m)>=16);if(any){any.role='head';h.head=any.id;}}
  }
}
function succession(){
  const old=W.monarch;
  const heirs=old.heirs.map(notableById).filter(n=>n&&n.alive).sort((a,b)=>b.age-a.age||a.id-b.id);
  const adult=heirs.find(h=>ageOf(h)>=16);
  if(adult){
    W.monarch=adult;adult.role='monarch';adult.house=0;adult.agenda='wears the crown newly';
    W.reignNum[adult.name]=(W.reignNum[adult.name]||0)+1;
    W.reignStart=day();
    W.legitimacy=clamp(W.legitimacy+8,0,100);
    reignHeader(adult);
    emit('crown',9,W.capital.pos,`${fullTitle(adult)} is crowned in ${W.capital.name} amid solemn rites and the acclaim of the crowd.`,{festival:true});
  }else if(heirs.length){
    const child=heirs[0];
    W.monarch=child;child.role='monarch';child.house=0;child.agenda='reigns under a regency';
    W.reignNum[child.name]=(W.reignNum[child.name]||0)+1;
    W.reignStart=day();
    W.legitimacy=clamp(W.legitimacy-18,0,100);
    W.settlements.forEach(s=>s.unrest=clamp(s.unrest+10,0,100));
    reignHeader(child);
    emit('crown',9,W.capital.pos,`The crown passes to the child ${child.name}, but ${child.age<8?'a babe':'a minor'} cannot rule; a regency of quarrelsome lords governs in ${child.sex==='f'?'her':'his'} name.`);
    W.houses.forEach(h=>{if(!h.crown&&!h.exiled)h.loyalty=clamp(h.loyalty-12,0,100);});
    // a child on the throne is an invitation
    if(!W.war){
      const amb=W.houses.map((h,i)=>i).filter(i=>i>0&&!W.houses[i].exiled&&W.houses[i].loyalty<42)
        .sort((a,b)=>W.houses[b].might-W.houses[a].might)[0];
      if(amb!==undefined&&chance('sim',0.5)){W.truceUntil=0;startWar(amb,'moves against the child on the throne');}
    }
  }else{
    // succession crisis: strongest house with a living claimant takes the throne
    W.legitimacy=clamp(W.legitimacy-30,0,100);
    const claimants=W.houses.map((h,i)=>i).filter(i=>i>0&&!W.houses[i].exiled)
      .sort((a,b)=>W.houses[b].might-W.houses[a].might);
    let head=null,ci=-1;
    for(const c of claimants){
      const cand=notableById(W.houses[c].head);
      if(cand&&cand.alive){head=cand;ci=c;break;}
      const any=W.notables.filter(n=>n.alive&&n.house===c&&ageOf(n)>=16).sort((x,y)=>ageOf(y)-ageOf(x))[0];
      if(any){head=any;ci=c;W.houses[c].head=any.id;any.role='head';break;}
    }
    if(!head){ // the realm scrapes the bottom of the barrel
      head=W.notables.filter(n=>n.alive&&ageOf(n)>=16).sort((x,y)=>ageOf(y)-ageOf(x))[0]
        ||mkNotable({name:personName('m'),sex:'m',age:30,birthDay:day()-30*360,house:0,role:'monarch',traits:twoTraits(),agenda:'claims a crown found in a ditch'});
    }
    emit('crown',10,W.capital.pos,`${fullTitle(old)} dies without an heir of the body! The succession is contested${ci>0?', and '+W.houses[ci].name+' presses its claim':''}.`);
    W.monarch=head;head.role='monarch';
    const rival=claimants.find(i=>i!==ci&&W.houses[i].loyalty<55);
    W.reignNum[head.name]=(W.reignNum[head.name]||0)+1;W.reignStart=day();
    head.house=0;if(ci>0){W.houses[ci].loyalty=95;adoptDynasty(ci);}
    reignHeader(head);
    if(rival!==undefined&&!W.war)startWar(rival,'presses a rival claim to the throne');
  }
}

/* ============================ MILITARY =================================== */
let armyN=0;
function raiseArmy(hi,fromS,strength,side){
  const s=W.settlements[fromS];
  const commanders=W.notables.filter(n=>n.alive&&n.house===hi&&ageOf(n)>=16&&(n.role==='head'||n.role==='scion'||n.role==='monarch'||n.role==='cousin'));
  const cmd=commanders[0]||W.notables.find(n=>n.alive&&ageOf(n)>=16);
  strength=Math.min(strength,s.pop*0.25);
  s.pop-=strength*0.7;
  const a={id:++armyN,house:hi,side,name:'Host of '+W.houses[hi].name.replace('House ',''),
    strength,morale:70+randi('sim',20),supply:100,commander:cmd?cmd.id:null,

function tickMilitary(){
  if(!W.war&&W.armies.length===0)return;
  const now=day();
  for(const a of W.armies)a._spos=armySimPos(a);
  for(const a of W.armies){

    if(a.state==='idle'&&W.war){
      // pick objective
      const enemyOwner=(si)=>a.side==='crown'?(W.settlements[si].owner===W.war.rebel||(W.armies.some(x=>x.side==='rebel'&&x.house===W.settlements[si].owner))):(W.settlements[si].owner===0);
      let tgt=-1,bd=1e18;
      W.settlements.forEach((s,si)=>{
        if(si===a.at)return;
        const hostile=a.side==='crown'?s.owner!==0:si===0||s.owner===0;
        if(!hostile)return;
        const d=dist2d(a._spos.x,a._spos.z,s.pos.x,s.pos.z);
        if(d<bd){bd=d;tgt=si;}
      });
      if(tgt>=0)marchArmy(a,tgt);
    }
    if(a.state==='march'&&now>=a.arriveDay){
      a.at=a.target;a.state='arrived';
      const s=W.settlements[a.at];
      const hostile=a.side==='crown'?s.owner!==0&&(s.owner===W.war?.rebel||W.armies.some(x=>x.side==='rebel'&&x.house===s.owner)):s.owner===0;
      if(W.war&&hostile){
        if(s.walls>0&&s.garrison>20){
          a.state='siege';a.siegeUntil=now+18+s.walls*22-(seasonIdx()===3?0:6);
          s.siegeBy={houseName:W.houses[a.house].name,army:a};
          emit('war',8,s.pos,`${a.name} invests ${s.name}; siege lines are dug and a camp of tents rises before the walls.`);
        }else takeSettlement(a,s);
      }else a.state='idle';
    }
    if(a.state==='siege'){
      const s=W.settlements[a.at];
      s.stores.grain=Math.max(0,s.stores.grain-s.pop*0.004);
      if(now>=a.siegeUntil){
        s.siegeBy=null;takeSettlement(a,s);
      }else if(chance('sim',0.01)){ // sortie
        const cmd=notableById(a.commander);
        if(resolveClash(a,{strength:s.garrison*3,morale:60,house:s.owner,name:'garrison of '+s.name})){
          emit('war',6,s.pos,`A sortie from ${s.name} is beaten back with slaughter at the gates.`);
        }else{

    }
    if(a.state==='rout'&&now>=a.arriveDay){a.state='idle';a.at=a.target;a.morale=55;}
  }
  // field battles: hostile armies in contact
  for(let i=0;i<W.armies.length;i++)for(let j=i+1;j<W.armies.length;j++){
    const a=W.armies[i],b=W.armies[j];
    if(a.side===b.side||a.state==='battle'||b.state==='battle'||a.state==='rout'||b.state==='rout')continue;
    if(dist2d(a._spos.x,a._spos.z,b._spos.x,b._spos.z)<130){
      a.state=b.state='battle';a.battleUntil=b.battleUntil=now+2;a.foe=b;b.foe=a;
      const where=nearestPlaceName(a._spos.x,a._spos.z);
      a.battleName=b.battleName='the Battle of '+where;a.battlePos={x:a._spos.x,z:a._spos.z};b.battlePos=a.battlePos;
      emit('war',8,a.battlePos,`The hosts meet near ${where}! Arrows darken the sky as the lines close.`);
    }
  }
  for(const a of W.armies){
    if(a.state==='battle'&&day()>=a.battleUntil&&a.foe){
      const b=a.foe;
      if(b.state!=='battle'){a.state='idle';continue;}
      const aWins=resolveClash(a,b);
      const w=aWins?a:b,l=aWins?b:a;
      const cw=notableById(w.commander),cl=notableById(l.commander);
      const pos=a.battlePos||{x:a._spos.x,z:a._spos.z};
      l.strength*=0.42;l.morale=35;w.strength*=0.85;
      W.stats.battles++;
      let line=`${w.name} carries the field at ${a.battleName}. The ${l.name.toLowerCase()} breaks and flees ${pick('sim',['into the dusk','through the fords','into the woods'])}.`;
      if(cl&&chance('sim',0.22)){killNotable(cl,`at ${a.battleName}, sword in hand`,true);line+=` ${fullTitle(cl)} is slain in the rout.`;}
      else if(cw&&!cw.epithet&&chance('sim',0.3)){cw.epithet='the '+pick('sim',['Ironhand','Unbroken','Lionhearted','Grim','Victorious']);line+=` Men now name the victor ${fullTitle(cw)}.`;}
      emit('war',8,pos,line);
      addCairn(pos.x,pos.z,a.battleName+', Year '+year()+' — here '+w.name+' prevailed.');
      warScore(w.side==='crown'?20:-20);
      a.state=b.state='idle';a.foe=b.foe=null;
      routHome(l);l.state='rout';
      if(l.strength<60)disbandArmy(l);
      if(w.strength<60)disbandArmy(w);
    }
  }
  // war score over time & exhaustion
  if(W.war){
    if(day()%30===0)warScore(W.settlements.filter(s=>s.owner===W.war.rebel).length>0?0:2);
    const rebelAlive=W.armies.some(a=>a.side==='rebel');
    const crownAlive=W.armies.some(a=>a.side==='crown');
    if(!rebelAlive&&!crownAlive)endWar(0);
    else if(!rebelAlive&&day()-W.war.start>40)endWar(1);
    else if(!crownAlive&&day()-W.war.start>40)endWar(-1);
    else if(W.war.score>=100)endWar(1);
    else if(W.war.score<=-100)endWar(-1);
    else if(day()-W.war.start>1400)endWar(0);
    // crown reinforcements if it can pay
    if(W.war&&!crownAlive&&W.treasury>1500&&chance('sim',0.05)){
      W.treasury-=800;raiseArmy(0,0,W.capital.pop*0.08,'crown');
    }
  }
}
function warScore(d){if(W.war)W.war.score=clamp(W.war.score+d,-120,120);}
function routHome(a){

function resolveClash(a,b){

  if(W.weather.state==='storm'||W.weather.state==='rain'){pa*=0.9+rand('sim')*0.2;pb*=0.9+rand('sim')*0.2;}

function nearestPlaceName(x,z){

/* ============================ THREATS ==================================== */
function igniteFire(s,n,cause){
  const cands=s.buildings.filter(b=>b.state==='sound');
  let lit=0;
  for(let i=0;i<n&&cands.length;i++){
    const b=pick('sim',cands);
    if(b.state==='sound'){b.state='burning';b.burnT=0;s.fires.push(b);updateBuildingInstance(b);lit++;}
  }
  return lit;
}
function tickThreats(){
  const dis=MOD.disaster*mythMult();
  const myth=MOD.myth;
  // random plague genesis (rare; trade is the usual vector)
  if(!W.plagueActive&&chance('sim',0.00035*dis*MOD.vir)){
    const s=pick('sim',W.settlements.filter(x=>x.harbor||x.kind==='capital'))||W.capital;
    s.infected=4;
    emit('fates',7,s.pos,`A strange sickness appears in ${s.name}: fevers, and dark blooms upon the skin. The learned mutter of ill airs.`);
  }
  // fires: spread & burn out
  for(const s of W.settlements){
    if(!s.fires.length)continue;
    const wet=W.weather.state==='rain'||W.weather.state==='storm'||W.weather.state==='snow';
    const dry=W.drought?1.8:1;
    const newFires=[];
    for(const b of s.fires){
      b.burnT++;
      if(b.burnT>=3){
        b.state='ruin';b.rebuildT=day()+180+randi('sim',300);s.ruinCount++;
        updateBuildingInstance(b);continue;
      }
      // spread through the adjacency graph, biased by wind
      for(const o of s.buildings){
        if(o.state!=='sound')continue;
        const d=dist2d(b.x,b.z,o.x,o.z);
        if(d<24&&chance('sim',(wet?0.05:0.3)*dry)){
          const windDot=((o.x-b.x)*Math.cos(W.weather.wind)+(o.z-b.z)*Math.sin(W.weather.wind))/(d||1);
          if(chance('sim',0.5+windDot*0.4)){o.state='burning';o.burnT=0;newFires.push(o);updateBuildingInstance(o);}
        }
      }
      newFires.push(b);
    }
    const before=s.fires.length;
    s.fires=newFires.filter(b=>b.state==='burning');
    if(before>0&&s.fires.length===0){
      if(s.ruinCount>=6){W.stats.greatFires++;
        emit('fates',8,s.pos,`The great fire of ${s.name} is spent at last. ${s.ruinCount} roofs are fallen to ash; the survivors sift the ruins.`);
        s.prosperity=clamp(s.prosperity-12,1,100);}
    }
    if(s.fires.length===5&&!s._gfAnnounced){s._gfAnnounced=true;
      emit('fates',8,s.pos,`Fire leaps from roof to roof in ${s.name}! The wind ${wet?'and the rain contend with':'feeds'} the blaze.`);}
    if(!s.fires.length)s._gfAnnounced=false;
  }
  // rebuilding — scars heal slowly, gated on prosperity
  if(day()%10===0)for(const s of W.settlements)for(const b of s.buildings){
    if(b.state==='ruin'&&day()>b.rebuildT&&s.prosperity>40&&chance('sim',0.3)){
      b.state='sound';s.ruinCount=Math.max(0,s.ruinCount-1);updateBuildingInstance(b);
    }
  }
  // lightning ignition
  if(W.weather.state==='storm'&&chance('sim',0.02*dis)){
    const s=pick('sim',W.settlements);
    if(igniteFire(s,1,'lightning'))emit('fates',5,s.pos,`Lightning strikes a roof in ${s.name} and flames take hold.`);
  }
  // drought
  const si=seasonIdx();
  if(si===1&&!W.drought&&W.clock.day%360>=95&&W.clock.day%360<=100&&chance('sim',0.05*dis)){
    W.drought=true;lastSeasonKey='';
    emit('fates',7,W.capital.pos,`No rain has fallen since the spring; the realm is gripped by drought. Fields wither to straw and the millponds shrink.`);
  }
  if(W.drought&&si===2){W.drought=false;lastSeasonKey='';
    emit('fates',5,W.capital.pos,`Autumn rains at last break the drought, though the harvest is thin.`);}
  // flood
  if(si===0&&W.snowpack>60&&(W.weather.state==='storm'||W.weather.state==='rain')&&chance('sim',0.05*dis)&&!W.flooding){
    W.flooding=8;W.snowpack=15;
    for(const s of W.settlements)if(s.river){
      s.prosperity=clamp(s.prosperity-8,1,100);
      const riverside=s.buildings.filter(b=>b.state==='sound').slice(0,3);
      for(const b of riverside)if(chance('sim',0.4)){b.state='ruin';b.rebuildT=day()+150;s.ruinCount++;updateBuildingInstance(b);}
      emit('fates',7,s.pos,`The river bursts its banks at ${s.name}! Brown water sweeps through the low streets, carrying off byres and bridges.`);
    }
  }
  // earthquake
  if(chance('sim',0.00009*dis)){
    const ex=(rand('sim')-0.5)*SIZE*0.8,ez=(rand('sim')-0.5)*SIZE*0.8;
    cam.shake=26;
    let wrecked=0;
    for(const s of W.settlements){
      if(dist2d(ex,ez,s.pos.x,s.pos.z)>1100)continue;
      for(const b of s.buildings)if(b.state==='sound'&&chance('sim',0.06)){b.state='ruin';b.rebuildT=day()+240;s.ruinCount++;updateBuildingInstance(b);wrecked++;}
      if(chance('sim',0.4))igniteFire(s,1,'quake');
    }
    emit('fates',9,{x:ex,z:ez},`The earth shakes! Walls crack and bells toll of themselves${wrecked?'; '+wrecked+' buildings are thrown down':''}. The pious speak of judgment.`);
  }
  // bandits
  tickBandits(dis);
  // dragon
  if(myth>=1)tickDragon();
  // omens
  tickOmens(myth,dis);
}
function tickBandits(dis){
  const avgUnrest=W.settlements.reduce((t,s)=>t+s.unrest,0)/W.settlements.length;
  if(W.banditCamps.length<3&&chance('sim',(0.0012+avgUnrest*0.00006+(W.war?0.002:0))*MOD.bandit)){
    // camp in forest far from settlements
    for(let t=0;t<40;t++){
      const cx=randi('sim',GRID),cz=randi('sim',GRID),i=cIdx(cx,cz);
      if(W.biome[i]!==B.FOREST&&W.biome[i]!==B.PINE)continue;
      const x=cellX(cx),z=cellZ(cz);
      if(W.settlements.some(s=>dist2d(x,z,s.pos.x,s.pos.z)<700))continue;
      const camp={x,z,raids:0,king:null,born:day()};
      W.banditCamps.push(camp);
      const g=campGroup(0x4a4038);g.position.set(x,hAt(x,z),z);
      g.traverse(o=>o.userData.pick={type:'camp',camp});
      scene.add(g);G.campMeshes.set(camp,g);
      emit('fates',5,{x,z},`Masterless men gather in the ${W.biome[i]===B.PINE?'pine uplands':'greenwood'}; travellers speak of a robber camp near ${nearestPlaceName(x,z)}.`);
      break;
    }
  }
  for(const camp of[...W.banditCamps]){
    // outlaws drift away if the pickings are thin
    if(day()-camp.born>900&&camp.raids<2){
      const g=G.campMeshes.get(camp);if(g)scene.remove(g);G.campMeshes.delete(camp);
      W.banditCamps=W.banditCamps.filter(x=>x!==camp);
      continue;
    }
    // ambush caravans passing near (position computed in sim time, not render time)
    for(const c of W.caravans){
      if(c.sea||c.river||c.robbed)continue; // barges are beyond the outlaws' reach
      const f=(day()-c.departDay)/Math.max(0.01,c.arriveDay-c.departDay);
      const p=polyPos(c.poly,f);
      if(!p)continue;
      if(dist2d(camp.x,camp.z,p.x,p.z)<320&&chance('sim',0.12*MOD.bandit)){
        c.robbed=true;camp.raids++;camp.loot=(camp.loot||0)+c.value;
        emit('fates',5,{x:p.x,z:p.z},`Bandits fall upon a caravan on the ${W.settlements[c.origin].name} road! The mules are driven off and the goods lost.`);
        W.settlements[c.dest].prosperity=clamp(W.settlements[c.dest].prosperity-1,1,100);
      }
    }
    if(camp.raids>=3&&!camp.king&&chance('sim',0.01)){
      camp.king=personName('m')+' '+pick('sim',['the Red','Hooksword','of the Hollow','Half-hanged','the Quiet']);

    }

      if(chance('sim',camp.king?0.45:0.75)){

        emit('war',5,camp,`The crown’s riders are ambushed in the deep wood and driven off; the outlaws grow bolder.`);
      }
    }
  }
}
function tickDragon(){
  const d=W.dragon;
  if(d.dead){
    if(!d.rebornAt)d.rebornAt=day()+38*360+randi('sim',10*360);
    if(day()>=d.rebornAt){
      W.dragon={name:pick('sim',NAMEB.dragon),lair:d.lair,state:'sleeping',hoard:500,pos:null,path:null,
        target:null,mood:'newly come',wakes:0};
      emit('fates',7,{x:d.lair.x,z:d.lair.z},`Shepherds swear that a shadow crossed the moon, and that something has taken up the old lair on the high peak. The elders name it ${W.dragon.name}.`);
    }
    return;
  }
  if(d.state==='sleeping'){
    d.mood=W.treasury>8000?'dreaming of gold':'slumbering';
    if(day()>(d.peaceUntil||0)&&chance('sim',clamp(W.treasury/30000,0,1)*0.0035*mythMult())){
      d.state='raiding';d.wakes++;
      const tgt=[...W.settlements].sort((a,b)=>b.prosperity*b.pop-a.prosperity*a.pop)[0];
      d.target=tgt;
      const L=d.lair;
      d.path=[{x:L.x,z:L.z,y:L.y+120},{x:(L.x+tgt.pos.x)/2,z:(L.z+tgt.pos.z)/2,y:500},{x:tgt.pos.x,z:tgt.pos.z,y:tgt.pos.y+60}];
      d.departDay=day();d.arriveDay=day()+dist2d(L.x,L.z,tgt.pos.x,tgt.pos.z)/3000;
      d.mood='wrathful';
      emit('fates',10,{x:L.x,z:L.z},`${d.name} has woken! The dragon lifts from the high peak on wings like storm-cloud, and turns toward ${tgt.name}.`);
    }
  }else if(d.state==='raiding'&&day()>=d.arriveDay){
    const t=d.target;
    igniteFire(t,3,'dragon');
    const stolen=Math.max(0,W.treasury*0.3);
    W.treasury-=stolen;d.hoard+=stolen;
    t.unrest=clamp(t.unrest+18,0,100);
    W.legitimacy=clamp(W.legitimacy-8,0,100);
    emit('fates',10,t.pos,`${d.name} descends upon ${t.name} in fire! A district burns, and the wyrm flies home heavy with ${Math.round(stolen)} in gold.`);
    d.state='returning';
    d.path=[{x:t.pos.x,z:t.pos.z,y:t.pos.y+80},{x:d.lair.x,z:d.lair.z,y:d.lair.y+120}];
    d.departDay=day();d.arriveDay=day()+dist2d(t.pos.x,t.pos.z,d.lair.x,d.lair.z)/3000;
  }else if(d.state==='returning'&&day()>=d.arriveDay){
    d.state='sleeping';d.mood='sated';
    // the crown responds, per the monarch's valor
    const m=W.monarch;
    if(m&&m.alive&&ageOf(m)>=16){
      if(m.traits.includes('bold')||(!m.traits.includes('craven')&&chance('sim',0.5))){
        d.slayAt=day()+25;d.slayer=m.id;
        emit('crown',8,W.capital.pos,`${fullTitle(m)} swears before the court to slay the wyrm, and calls for volunteers of good courage.`);
      }else{
        const tribute=W.treasury*0.2;
        W.treasury-=tribute;d.hoard+=tribute;d.peaceUntil=day()+1800;
        W.legitimacy=clamp(W.legitimacy-6,0,100);
        emit('crown',7,W.capital.pos,`${fullTitle(m)} sends tribute of ${Math.round(tribute)} gold to the dragon's peak, buying an uneasy peace. The smallfolk grumble at the cost.`);
      }
    }
  }
  if(d.slayAt&&day()>=d.slayAt){
    const m=notableById(d.slayer);d.slayAt=null;
    if(m&&m.alive){
      if(chance('sim',0.45)){
        d.dead=true;d.state='dead';d.mood='slain';
        W.treasury+=d.hoard;W.legitimacy=clamp(W.legitimacy+25,0,100);
        m.epithet='the Dragonslayer';
        emit('crown',10,{x:d.lair.x,z:d.lair.z},`Wonder of the age! ${fullTitle(m)} has slain ${d.name} upon the high peak. The hoard — ${Math.round(d.hoard)} in old gold — is carried down by torchlight.`,{festival:true});
      }else{
        emit('fates',10,{x:d.lair.x,z:d.lair.z},`Woe! ${fullTitle(m)} is burned upon the mountainside by ${d.name}, and the host returns bearing only a scorched shield.`);
        killNotable(m,'in dragonfire upon the peak',true);
        d.peaceUntil=day()+900;
      }
    }
  }
}
function tickOmens(myth,dis){
  if(myth<1)return;

      const p=mkNotable({name:personName(chance('sim',0.5)?'m':'f'),sex:'m',age:40,birthDay:day()-40*360,house:0,role:'Prophet',traits:['pious','bold'],agenda:'cries doom in the market squares'});

  if(W.eclipse<=0&&chance('sim',0.00025*dis)){
    W.eclipse=1.2;

    W.settlements.forEach(s=>s.unrest=clamp(s.unrest+(myth>=2?7:3),0,100));

  if(chance('sim',0.0004*dis)){

      `A calf with two heads is born near ${s.name}; the priests dispute its meaning.`,

  }

/* ============================ GROWTH ===================================== */
/* Population drives the built fabric both ways: growth raises new roofs
   (outside the walls once the core is full), decline lets them fall to ruin,
   and sustained prosperity upgrades buildings through the tiers
   (hovel-built → timber-framed → stone-built). */
function tickGrowth(){
  if(day()%6!==0)return;
  for(const s of W.settlements){
    const cap=s.buildings.filter(b=>b.state==='sound').length*6+30;
    if(s.pop>cap&&s.prosperity>42&&!s.siegeBy){
      const b=addBuildingLive(s);
      if(b&&chance('sim',0.06))
        emit('trade',3,s.pos,`${s.name} grows: new roofs rise in the ${b.district} quarter.`);
    }else if(s.pop<cap*0.35&&chance('sim',0.1)){
      const b=s.buildings.filter(b=>b.state==='sound'&&b.district==='residential').pop();
      if(b){b.state='ruin';b.rebuildT=day()+400;s.ruinCount++;updateBuildingInstance(b);}
    }
    // prosperity slowly rebuilds in better material
    if(s.prosperity>62&&!s.siegeBy&&chance('sim',0.25)){
      const ups=s.buildings.filter(b=>b.state==='sound'&&b.tier<2&&b.arch!=='wall');
      if(ups.length){
        const b=pick('sim',ups);
        b.tier++;
        const a=ARCH[b.arch];
        b.w=a[0]*(0.85+b.tier*0.15);b.d=a[1]*(0.85+b.tier*0.15);b.h=a[2]*(0.8+b.tier*0.25);
        updateBuildingInstance(b);
        if(chance('sim',0.04))
          emit('trade',3,s.pos,`A ${a[4]} in ${s.name} is rebuilt in ${b.tier===2?'good stone':'timber and plaster'}; the street is the finer for it.`);
      }
    }
  }
}

function doAct(act,p){
  const nearS=()=>{let b=W.settlements[0],bd=1e18;for(const s of W.settlements){const d=dist2d(p.x,p.z,s.pos.x,s.pos.z);if(d<bd){bd=d;b=s;}}return b;};
  switch(act){
    case 'plague':{const s=nearS();s.infected=Math.max(s.infected,6);
      emit('fates',7,s.pos,`A pestilence breaks out in ${s.name}; the first houses are marked with white crosses.`);break;}
    case 'fire':{const s=nearS();if(igniteFire(s,2,'act'))emit('fates',6,s.pos,`Fire! Flames leap up in ${s.name}.`);break;}
    case 'flood':{W.snowpack=90;W.flooding=8;
      for(const s of W.settlements)if(s.river){s.prosperity=clamp(s.prosperity-8,1,100);

      for(const s of W.settlements){if(dist2d(p.x,p.z,s.pos.x,s.pos.z)>1100)continue;
        for(const b of s.buildings)if(b.state==='sound'&&chance('sim',0.07)){b.state='ruin';b.rebuildT=day()+240;s.ruinCount++;updateBuildingInstance(b);n++;}
        if(chance('sim',0.5))igniteFire(s,1,'quake');}
      emit('fates',9,p,`The earth heaves${n?' and '+n+' buildings fall':''}; a long groan runs through the hills.`);break;}
    case 'dragon':{if(W.dragon&&!W.dragon.dead){W.dragon.peaceUntil=0;W.treasury=Math.max(W.treasury,9000);
      const d=W.dragon;d.state='sleeping';/* will wake next ticks */
      d.forceWake=true;emit('fates',6,{x:d.lair.x,z:d.lair.z},`Something stirs on the high peak; shepherds drive their flocks down before nightfall.`);}break;}
    case 'bandits':{const camp={x:p.x,z:p.z,raids:0,king:null,born:day()};W.banditCamps.push(camp);
      const g=campGroup(0x4a4038);g.position.set(p.x,hAt(p.x,p.z),p.z);
      g.traverse(o=>o.userData.pick={type:'camp',camp});

    case 'assassinate':{const m=W.monarch;if(m&&m.alive){
      emit('crown',10,W.capital.pos,`Murder in the court! ${fullTitle(m)} is slain by a hired knife${pick('sim',[' at the feast',' upon the stair',' at prayer'])}. The realm holds its breath.`);

    case 'contest':{if(!W.war){const c=W.houses.map((h,i)=>i).filter(i=>i>0&&!W.houses[i].exiled);
      if(c.length){const hi=c.sort((a,b)=>W.houses[a].loyalty-W.houses[b].loyalty)[0];

      const a=single.find(n=>n.house===0)||single[0];
      const b=single.find(n=>n&&a&&n!==a&&n.sex!==a.sex&&n.house!==a.house);
      if(a&&b){a.spouse=b.id;b.spouse=a.id;
        const oh=W.houses[a.house===0?b.house:a.house];if(oh)oh.loyalty=clamp(oh.loyalty+12,0,100);

        emit('crown',6,W.capital.pos,`A royal match is arranged: ${fullTitle(a)} weds ${fullTitle(b)}. ${W.capital.name} feasts beneath bright banners.`,{festival:true});}break;}
    case 'bless':{for(const s of W.settlements)s.stores.grain+=s.pop*0.35;W.drought=false;lastSeasonKey='';
      emit('trade',4,W.capital.pos,`The season turns kind beyond all memory: granaries groan and the price of bread falls to nothing.`);break;}

        res:{farm:6,forest:2,ore:0,fish:0}};

      W.roads.push({a:si,b:bj,path,len:bd});W.routes={};
      W.adj[si].push({to:bj,ri:W.roads.length-1});W.adj[bj].push({to:si,ri:W.roads.length-1});
      rebuildRoadMesh();lastSeasonKey=''; // show the new track and its ground tint
      for(let i=0;i<10;i++)addBuildingLive(s);
      const sp=makeTextSprite(s.name,1.6);sp.position.set(p.x,s.pos.y+90,p.z);scene.add(sp);G.labels.push(sp);
      const m=new THREE.Mesh(new THREE.SphereGeometry(60,8,6),new THREE.MeshBasicMaterial({visible:false}));

    case 'raze':{let bb=null,bd=1e18;

        emit('fates',2,p,`A ${ARCH[bb.arch][4]} in ${bb.s.name} is pulled down by order of the crown.`);}break;}
  }
}

   CHRONICLE — the product. Dated entries in annalist voice; click to fly.
   ========================================================================= */
const chronList=()=>document.getElementById('chronlist');
let chronFilter='all', allLines=[], entryCount=0;
const CATMAP={crown:'crown',war:'war',trade:'trade',fates:'fates'};
function emit(cat,pri,pos,text,opts){
  const ev={day:day(),cat,pri,pos:pos?{x:pos.x,z:pos.z}:null,text,opts:opts||{}};
  chronicleAdd(ev);
  director.push(ev);
  return ev;
}
function chronicleAdd(ev){
  allLines.push('['+dateStr(ev.day)+'] '+ev.text);
  const el=document.createElement('div');
  el.className='centry';el.dataset.cat=ev.cat;
  el.innerHTML='<span class="cd">'+dateStr(ev.day)+'.</span> '+ev.text.replace(/</g,'&lt;');
  if(ev.pos)el.addEventListener('click',()=>{flyTo(ev.pos.x,ev.pos.z,420);markManual();});
  if(chronFilter!=='all'&&ev.cat!==chronFilter)el.style.display='none';
  const list=chronList();
  const stick=list.scrollTop+list.clientHeight>list.scrollHeight-60;
  list.appendChild(el);
  entryCount++;
  while(list.children.length>260)list.removeChild(list.firstChild);
  if(stick)list.scrollTop=list.scrollHeight;
}
function reignHeader(n){

/* =========================================================================
   AUTO-DIRECTOR — flies the camera to the story
   ========================================================================= */
const director={queue:[],shot:null,shotUntil:0,cool:{},idleUntil:0,idleTarget:null,
  push(ev){
    if(ev.pri<3||!ev.pos)return;
    this.queue.push({ev,born:perfNow()});
    if(this.queue.length>12)this.queue.sort((a,b)=>b.ev.pri-a.ev.pri).length=12;
  },
  update(now,dt){
    if(cam.mode!=='director'&&!document.body.classList.contains('watch')){
      if(this.shot){this.shot=null;hideBeat();} // don't leave a stale card when the user takes the wheel
      return;
    }
    if(now<cam.manualUntil){
      if(this.shot){this.shot=null;hideBeat();}
      return;
    }
    // expire stale
    this.queue=this.queue.filter(q=>now-q.born<50&&(!this.shot||q.ev!==this.shot.ev));
    // pick a beat
    let best=null;
    for(const q of this.queue){
      const cd=this.cool[q.ev.cat+q.ev.pri]||0;
      if(now<cd&&q.ev.pri<9)continue;
      if(!best||q.ev.pri>best.ev.pri)best=q;
    }
    const curPri=this.shot?this.shot.ev.pri:-1;
    if(best&&(now>=this.shotUntil||best.ev.pri>curPri+1)){
      this.queue=this.queue.filter(q=>q!==best);
      this.beginShot(best.ev,now);
    }else if(!this.shot||now>=this.shotUntil){
      this.shot=null;
      hideBeat();
      // idle: golden-hour establishing orbits (Math.random — must not touch the sim stream)
      if(now>=this.idleUntil){
        this.idleUntil=now+22;
        const s=W.settlements[Math.floor(Math.random()*W.settlements.length)];
        flyTo(s.pos.x,s.pos.z,700+Math.random()*1400,Math.random()*Math.PI*2);
      }
      cam.yaw+=dt*0.03;
    }
    if(this.shot){
      const sh=this.shot;
      cam.yaw+=dt*sh.orbit;
      const t=now-sh.start;
      if(t>3&&sh.push&&cam.dist>sh.push)cam.dist=Math.max(sh.push,cam.dist*Math.pow(0.9,dt*60));
      if(sh.follow&&!cam.follow){cam.follow=sh.follow;}
    }
  },
  beginShot(ev,now){
    const hold=ev.pri>=9?18:ev.pri>=7?14:10;
    this.shot={ev,start:now,orbit:0.05,push:null,follow:null};
    this.shotUntil=now+hold;
    this.cool[ev.cat+ev.pri]=now+45;
    cam.follow=null;
    let d=500;
    if(ev.opts.follow)this.shot.follow=ev.opts.follow;
    if(ev.cat==='war'){d=800;this.shot.push=380;this.shot.orbit=0.08;}
    else if(ev.cat==='fates'&&ev.pri>=9){d=900;this.shot.push=420;}
    else if(ev.cat==='fates'){d=600;this.shot.push=320;}
    else if(ev.opts.festival){d=420;this.shot.orbit=0.12;}
    else if(ev.cat==='crown'){d=520;this.shot.push=300;}
    else if(ev.cat==='trade'){d=600;}
    if(W.dragon&&W.dragon.state==='raiding'&&ev.pri===10&&ev.cat==='fates'){this.shot.follow=W.dragon;}
    flyTo(ev.pos.x,ev.pos.z,d,cam.yaw+0.6);
    showBeat(ev);
  }
};

    g.strokeStyle='rgba(233,220,195,0.85)';g.lineWidth=3;g.strokeText(s.name,x,z-9);
    g.fillText(s.name,x,z-9);
  }

  g.strokeStyle='#2B2320';g.lineWidth=3;g.strokeRect(8,8,S-16,S-16);
  g.lineWidth=1;g.strokeRect(14,14,S-28,S-28);

  return c;
}

   ========================================================================= */
function polyPos(poly,f){
  if(!poly||!poly.length)return null;
  if(poly.length===1)return{x:poly[0].x,z:poly[0].z};
  f=clamp(f,0,1);
  const total=poly._len||(poly._len=poly.reduce((t,p,i)=>i?t+dist2d(poly[i-1].x,poly[i-1].z,p.x,p.z):0,0));
  let want=f*total,acc=0;
  for(let i=1;i<poly.length;i++){
    const seg=dist2d(poly[i-1].x,poly[i-1].z,poly[i].x,poly[i].z);
    if(acc+seg>=want){
      const t=seg>0?(want-acc)/seg:0;
      return{x:lerp(poly[i-1].x,poly[i].x,t),z:lerp(poly[i-1].z,poly[i].z,t),
        y:poly[i].y!==undefined?lerp(poly[i-1].y??poly[i].y,poly[i].y,t):undefined,
        dir:Math.atan2(poly[i].z-poly[i-1].z,poly[i].x-poly[i-1].x)};
    }
    acc+=seg;
  }
  const last=poly[poly.length-1];
  return{x:last.x,z:last.z,y:last.y};
}

let dayCycleOn=false; // steady daylight by default — the cycle strobes at high sim speeds
function currentDayF(){
  if(!dayCycleOn)return 0.42; // pleasant late morning
  // compress night to ~20% of the cycle so the documentary stays watchable
  const t=(W.visT||0)%1;
  return t<0.8?0.25+(t/0.8)*0.5:0.75+((t-0.8)/0.2)*0.5;
}
function animateWorld(dt,now){
  const dayF=currentDayF();
  const simDay=W.clock.day;
  /* --- sun / moon / sky --- */
  const el2=Math.sin((dayF-0.25)*2*Math.PI); // sun elevation: dawn .25, noon .5, dusk .75
  const sunDir=new THREE.Vector3(Math.cos(dayF*Math.PI*2)*0.8,el2,Math.sin(dayF*Math.PI*2)*0.55).normalize();
  const daylight=clamp(el2*1.6+0.12,0.14,1); // nights stay readable, never pitch black
  const eclipseF=W.eclipse>0?0.12:1;
  const overcastF=(W.weather.state==='clear')?1:(W.weather.state==='overcast'?0.72:0.5);
  G.sun.intensity=1.25*daylight*eclipseF*overcastF;
  G.sun.position.copy(sunDir).multiplyScalar(2600).add(cam.cur.focus);
  G.sun.target.position.copy(cam.cur.focus);
  G.sun.castShadow=cam.cur.dist<1600&&daylight>0.05;
  const sc=G.sun.shadow.camera,ext=clamp(cam.cur.dist*0.9,220,1200);
  sc.left=-ext;sc.right=ext;sc.top=ext;sc.bottom=-ext;sc.updateProjectionMatrix();
  G.hemi.intensity=0.2+0.42*daylight*eclipseF;
  G.amb.intensity=0.18+0.12*daylight;
  G.sunDisc.position.copy(sunDir).multiplyScalar(11800).add(camera.position);
  G.sunDisc.visible=el2>-0.06;
  G.moonDisc.position.copy(sunDir).multiplyScalar(-11800).add(camera.position);
  G.moonDisc.visible=el2<0.1;
  // sky palette
  const night=new THREE.Color(0x0d1526),nightB=new THREE.Color(0x141c30);
  const dayT=new THREE.Color(0x7fb2dd),dayB=new THREE.Color(0xd7e3e8);
  const duskT=new THREE.Color(0x4a5a8a),duskB=new THREE.Color(0xe89a5a);
  let top,bot;
  const tw=clamp(Math.abs(el2)/0.22,0,1);
  if(el2>0){top=duskT.clone().lerp(dayT,tw);bot=duskB.clone().lerp(dayB,tw);}
  else{top=duskT.clone().lerp(night,tw);bot=duskB.clone().lerp(nightB,tw);}
  if(W.weather.state!=='clear'&&el2>0){top.multiplyScalar(overcastF*0.9);bot.multiplyScalar(overcastF*0.95);}
  if(W.eclipse>0){top.multiplyScalar(0.25);bot.multiplyScalar(0.3);}
  G.skyU.top.value.copy(top);G.skyU.bot.value.copy(bot);
  G.skyU.sunPos.value.copy(sunDir);
  G.sky.position.copy(camera.position);G.stars.position.copy(camera.position); // dome follows the eye
  scene.fog.color.copy(bot).multiplyScalar(0.96);
  const fogBase=W.weather.state==='rain'||W.weather.state==='snow'?1400:2600;
  const fogNear=Math.max(fogBase,cam.cur.dist*1.5); // don't wash out the map view from altitude
  scene.fog.near=fogNear;scene.fog.far=fogNear*4.4;
  G.stars.material.opacity=clamp(-el2*4,0,0.9);
  // night windows & torches
  const nightF=clamp(-el2*5,0,1);
  G.bodies.material.emissive=G.bodies.material.emissive||new THREE.Color();
  G.bodies.material.emissive.setRGB(0.22*nightF,0.13*nightF,0.03*nightF);
  if(nightF>0.3){
    let ti=0,nearest=null,nd=1e18;
    for(const s of W.settlements){const d=dist2d(camera.position.x,camera.position.z,s.pos.x,s.pos.z);if(d<nd){nd=d;nearest=s;}}
    if(nearest&&nd<800){
      for(const b of nearest.buildings){
        if(ti>=G.torches.length)break;
        if(b.district==='market'&&b.state==='sound'){
          const t=G.torches[ti++];t.position.set(b.x,b.y+5,b.z);t.intensity=1.4*nightF;
        }
      }
    }
    for(let i=ti;i<G.torches.length;i++)G.torches[i].intensity=0;
  }else G.torches.forEach(t=>t.intensity=0);
  /* --- seasons --- */
  updateTerrainColors(seasonIdx(),(simDay%90)/90);
  /* --- water --- */
  if(G.rivers){G.rivers.position.y=(W.flooding>0?2.6:0)+Math.sin(now*1.7)*0.15;}
  if(G.sea)G.sea.position.y=SEA+0.5+Math.sin(now*0.9)*0.3;
  for(const wh of G.wheels)wh.rotation.x+=dt*1.4;
  /* --- weather particles --- */
  const raining=W.weather.state==='rain'||W.weather.state==='storm';
  const snowing=W.weather.state==='snow';
  G.rain.visible=raining;G.snow.visible=snowing;
  if(raining||snowing){
    const P=(raining?G.rain:G.snow).geometry.attributes.position;
    const speed=raining?300:40;
    for(let i=0;i<P.count;i++){
      let y=P.getY(i)-speed*dt*(0.7+((i*13)%10)/18);
      if(y<0)y=420+Math.random()*80;
      P.setXYZ(i,camera.position.x+((i*127)%900)-450+(snowing?Math.sin(now+i)*14:0),
        Math.min(y,camera.position.y+300),
        camera.position.z+((i*311)%900)-450);
      P.setY(i,y);
    }
    P.needsUpdate=true;
  }
  if(W.weather.state==='storm'&&Math.random()<dt*0.25){G.amb.intensity=1.6;setTimeout(()=>G.amb.intensity=0.25,90);}
  /* --- smoke & flame --- */
  {
    // chimney smoke near camera, pyres, burning buildings
    let nearest=null,nd=1e18;
    for(const s of W.settlements){const d=dist2d(camera.position.x,camera.position.z,s.pos.x,s.pos.z);if(d<nd){nd=d;nearest=s;}}
    if(nearest&&nd<1500&&Math.random()<dt*24){
      const b=nearest.buildings[Math.floor(Math.random()*nearest.buildings.length)];
      if(b&&b.state==='sound')spawnSmoke(b.x,b.y+b.h*1.6,b.z,false);
      if(nearest.pyres&&Math.random()<0.5)spawnSmoke(nearest.pos.x+30,nearest.pos.y+6,nearest.pos.z,true);
    }
    for(const s of W.settlements)for(const b of s.fires){
      if(Math.random()<dt*20){spawnFlame(b.x,b.y+3,b.z);spawnSmoke(b.x,b.y+b.h+4,b.z,true);}
    }
    if(W.dragon&&W.dragon.state==='raiding'&&G.dragonMesh.visible&&Math.random()<dt*10)
      spawnSmoke(G.dragonMesh.position.x,G.dragonMesh.position.y-3,G.dragonMesh.position.z,true);
    const sp=G.smoke.geometry.attributes.position;
    G.smokeData.forEach((p,i)=>{
      if(p.life>0){p.life-=dt;p.y+=p.vy*dt;p.x+=Math.cos(W.weather.wind)*dt*4;p.z+=Math.sin(W.weather.wind)*dt*4;
        sp.setXYZ(i,p.x,p.y,p.z);}
      else sp.setXYZ(i,0,-999,0);
    });
    sp.needsUpdate=true;
    const fp=G.flames.geometry.attributes.position;
    G.flameData.forEach((p,i)=>{
      if(p.life>0){p.life-=dt;p.y+=dt*6;fp.setXYZ(i,p.x,p.y,p.z);}
      else fp.setXYZ(i,0,-999,0);
    });
    fp.needsUpdate=true;
  }
  /* --- comet --- */
  if(W.comet&&simDay<W.comet.start+12){
    const f=(simDay-W.comet.start)/12;
    G.comet.visible=true;
    const a=f*Math.PI;
    G.comet.position.set(camera.position.x-Math.cos(a)*9000,3000+Math.sin(a)*4000,camera.position.z-7000+f*3000);
    G.comet.lookAt(G.comet.position.x+1000,G.comet.position.y+400,G.comet.position.z);
  }else G.comet.visible=false;
  /* --- caravans & cogs --- */
  let ci=0,cogI=0,dotI=0;
  const unitScale=clamp(cam.cur.dist*0.0035,1,6); // keep traffic legible from altitude
  const showDots=cam.cur.dist>900;
  for(const c of W.caravans){
    const f=(simDay-c.departDay)/Math.max(0.01,c.arriveDay-c.departDay);
    const p=polyPos(c.poly,f);
    if(!p)continue;
    const y=c.sea?SEA+1:(c.river?hAt(p.x,p.z)+1.2:hAt(p.x,p.z)+1.0); // road surface or water line
    c._rpos={x:p.x,y:y+8,z:p.z};
    if(!c.proxy){
      c.proxy=new THREE.Mesh(new THREE.SphereGeometry(16,6,5),new THREE.MeshBasicMaterial({visible:false}));
      c.proxy.userData.pick={type:'caravan',c};scene.add(c.proxy);
    }
    c.proxy.position.set(p.x,y+6,p.z);
    if(c.sea||c.river){
      if(cogI<G.cogs.length){const g=G.cogs[cogI++];g.visible=true;g.position.set(p.x,y,p.z);g.rotation.y=-(p.dir||0);g.scale.setScalar(Math.min(unitScale,c.river?2:3));}
    }else if(ci<48){
      setInst(G.caravans,ci++,p.x,y,p.z,-(p.dir||0),unitScale,unitScale,unitScale);
    }
    if(showDots&&dotI<G.caravanDots.length){
      const sp=G.caravanDots[dotI++];
      sp.visible=true;sp.position.set(p.x,y+14,p.z);
      const ds=clamp(camera.position.distanceTo(sp.position)*0.01,8,40);
      sp.scale.set(ds,ds,1);
    }
  }
  for(let i=ci;i<48;i++)setInst(G.caravans,i,0,-500,0,0,1,1,1);
  for(let i=cogI;i<G.cogs.length;i++)G.cogs[i].visible=false;
  for(let i=dotI;i<G.caravanDots.length;i++)G.caravanDots[i].visible=false;
  G.caravans.instanceMatrix.needsUpdate=true;
  /* --- armies --- */
  let si2=0;
  for(const a of W.armies){
    let p;
    if(a.state==='march'||a.state==='rout'){
      const f=(simDay-a.departDay)/Math.max(0.01,a.arriveDay-a.departDay);
      p=polyPos(a.poly,f);
    }
    if(!p){const s=W.settlements[a.at];p={x:s.pos.x+(a.state==='siege'?90:20),z:s.pos.z+40,dir:0};}
    const y=hAt(p.x,p.z);
    a._rpos={x:p.x,y:y+10,z:p.z};
    if(a.flag){
      const fs=clamp(cam.cur.dist*0.0011,1,4.5);
      a.flag.position.set(p.x,y+14+fs*3+Math.sin(now*2+a.id)*0.6,p.z);
      a.flag.rotation.y=camera.rotation.y;
      a.flag.scale.setScalar(fs);
    }
    // soldiers when near
    const dcam=dist2d(camera.position.x,camera.position.z,p.x,p.z);
    if(dcam<2400){
      const n=Math.min(90,Math.max(8,Math.round(a.strength/8)));
      const dir=p.dir||0;
      for(let k=0;k<n&&si2<900;k++){
        const col=k%6-2.5,row=Math.floor(k/6);
        const ox=Math.cos(dir)*(-row*3)+Math.cos(dir+Math.PI/2)*col*2.6;
        const oz=Math.sin(dir)*(-row*3)+Math.sin(dir+Math.PI/2)*col*2.6;
        let jx=0,jz=0;
        if(a.state==='battle'){jx=Math.sin(now*7+k*3)*1.4;jz=Math.cos(now*6+k*5)*1.4;}
        const sx=p.x+ox+jx,sz=p.z+oz+jz;
        const bob=a.state==='march'?Math.abs(Math.sin(now*8+k))*0.4:0;
        setInst(G.soldiers,si2,sx,hAt(sx,sz)+0.9+bob,sz,-dir+Math.PI/2,1,1,1);
        G.soldiers.setColorAt(si2,C1.setHex(W.houses[a.house].sigilHue[0]));
        si2++;
      }
    }
  }
  for(let i=si2;i<900;i++)setInst(G.soldiers,i,0,-500,0,0,1,1,1);
  G.soldiers.instanceMatrix.needsUpdate=true;
  if(G.soldiers.instanceColor)G.soldiers.instanceColor.needsUpdate=true;
  /* --- dragon --- */
  const d=W.dragon;
  if(d&&!d.dead){
    if(d.state==='raiding'||d.state==='returning'){
      const f=clamp((simDay-d.departDay)/Math.max(0.01,d.arriveDay-d.departDay),0,1);
      const p=polyPos(d.path,f);
      if(p){
        G.dragonMesh.visible=true;
        const py=p.y!==undefined?p.y:400;
        G.dragonMesh.position.set(p.x,py,p.z);
        G.dragonMesh.rotation.y=-(p.dir||0)+Math.PI/2;
        d._rpos={x:p.x,y:py,z:p.z};
        const flap=Math.sin(now*6)*0.7;
        G.dragonWings[0].rotation.z=flap;G.dragonWings[1].rotation.z=-flap;
      }
    }else if(d.state==='sleeping'&&cam.cur.dist<3000&&dist2d(camera.position.x,camera.position.z,d.lair.x,d.lair.z)<2200){
      G.dragonMesh.visible=true;
      G.dragonMesh.position.set(d.lair.x,d.lair.y+6,d.lair.z);
      d._rpos={x:d.lair.x,y:d.lair.y+6,z:d.lair.z};
      G.dragonWings[0].rotation.z=1.2;G.dragonWings[1].rotation.z=-1.2;
    }else G.dragonMesh.visible=false;
  }else if(G.dragonMesh)G.dragonMesh.visible=false;
  /* --- citizens (bubble band) --- */
  {
    let nearest=null,nd=1e18;
    for(const s of W.settlements){const dd=dist2d(camera.position.x,camera.position.z,s.pos.x,s.pos.z);if(dd<nd){nd=dd;nearest=s;}}
    if(nearest&&cam.cur.dist<200&&nd<nearest.radius+250){
      if(G.citList.length===0||G.citList[0].s!==nearest){
        G.citList=[];
        const n=Math.min(60,Math.round(nearest.pop/12)+6);
        for(let i=0;i<n;i++){
          const b=nearest.buildings[Math.floor(Math.random()*nearest.buildings.length)];
          if(!b)break;
          G.citList.push({s:nearest,x:b.x+4,z:b.z+4,dir:Math.random()*7,t:0});
        }
      }
      let k=0;
      for(const c of G.citList){
        c.t-=dt;
        if(c.t<=0){c.dir=Math.random()*Math.PI*2;c.t=1+Math.random()*3;}
        c.x+=Math.cos(c.dir)*dt*3;c.z+=Math.sin(c.dir)*dt*3;
        const dd=dist2d(c.x,c.z,c.s.pos.x,c.s.pos.z);
        if(dd>c.s.radius){c.dir+=Math.PI;}
        const bob=Math.abs(Math.sin(now*6+k*2))*0.3;
        setInst(G.citizens,k++,c.x,hAt(c.x,c.z)+0.85+bob,c.z,-c.dir+Math.PI/2,0.9,0.9,0.9);
      }
      for(let i=k;i<80;i++)setInst(G.citizens,i,0,-500,0,0,1,1,1);
      G.citizens.instanceMatrix.needsUpdate=true;
    }else if(G.citList.length){
      G.citList=[];
      for(let i=0;i<80;i++)setInst(G.citizens,i,0,-500,0,0,1,1,1);
      G.citizens.instanceMatrix.needsUpdate=true;
    }
  }
  /* --- birds --- */
  for(const b of G.birds){
    const u=b.userData;u.a+=dt*u.sp;
    const bx=u.c.x+Math.cos(u.a)*u.r,bz=u.c.z+Math.sin(u.a)*u.r;
    b.position.set(bx,Math.max(hAt(bx,bz)+40,u.c.y?u.c.y+u.h:u.h+hAt(bx,bz)),bz);
    b.rotation.y=-u.a;
  }
  /* --- labels: fade by distance --- */
  for(const sp of G.labels){
    const dd=camera.position.distanceTo(sp.position);
    const vis=G.labelsOn&&cam.cur.dist>240;
    sp.visible=vis;
    if(vis){
      const sc=clamp(dd*0.0011,0.45,3.4);
      sp.scale.set(sp.userData.w*0.42*sc,sp.userData.h*0.42*sc,1);
      sp.material.opacity=clamp((dd-180)/300,0,1);
    }
  }
  for(const bn of G.banners)bn.rotation.y=Math.sin(now*0.8)*0.3+camera.rotation.y*0.2;
}

/* =========================================================================
   MAIN LOOP & BOOT
   ========================================================================= */
let simAccum=0,lastT=0,hudT=0,overlayT=0;
function animate(t){
  requestAnimationFrame(animate);
  const now=t/1000;
  let dt=Math.min(0.1,now-lastT||0.016);lastT=now;
  // advance simulation
  simAccum+=dt*SPEEDS[speedIdx];
  let ticks=0;
  while(simAccum>=1&&ticks<40){simAccum-=1;simTick();ticks++;}
  if(simAccum>45)simAccum=45; // don't spiral if a frame stalls
  W.clock.frac=W.clock.frac||0;
  if(SPEEDS[speedIdx]>0)W.clock.frac=simAccum; // 0..1 within the current day
  // cinematic sun: a full day/night cycle every ~150 real seconds while running,
  // decoupled from sim speed so high speeds don't strobe the lighting
  if(SPEEDS[speedIdx]>0)W.visT=(W.visT||0.38)+dt/150;
  const displayDay=W.clock.day+clamp(W.clock.frac,0,0.999);
  const saveDay=W.clock.day;W.clock.day=displayDay;
  director.update(perfNow(),dt);
  updateCamera(dt,now);
  animateWorld(dt,now);
  W.clock.day=saveDay;
  hudT-=dt;
  if(hudT<=0){hudT=0.5;updateHUD();}
  overlayT-=dt;
  if(overlayT<=0){overlayT=6;if(overlayMode)refreshOverlay();}
  renderer.render(scene,camera);
}
async function boot(){
  const m=location.hash.match(/s=(\d+)/);
  const seed=m?parseInt(m[1],10)>>>0:Math.floor(Math.random()*1e9);
  if(!m)history.replaceState(null,'','#s='+seed);
  const line=document.getElementById('loadline'),bar=document.querySelector('#loadbar>div');
  const progress=(txt,f)=>{line.textContent=txt;bar.style.width=Math.round(f*100)+'%';
    return new Promise(r=>setTimeout(r,30));};
  await progress('Forging the realm…',0.02);
  await generateWorld(seed,progress);
  initGraphics();
  buildTerrain();buildTrees();buildBuildings();buildLabels();buildAgents();buildParticles();buildDynamic();
  simInit();
  initUI();initInput();
  // opening entries
  allLines.push('THE ANNALS OF '+W.name.toUpperCase());
  const m0=W.monarch;
  reignHeader(m0);
  emit('crown',4,W.capital.pos,`Here begin the annals of the realm of ${W.name}, set down faithfully by the chroniclers of ${W.capital.name}.`);
  emit('crown',3,W.capital.pos,`${fullTitle(m0)}, ${m0.traits.join(' and ')}, holds the throne at ${W.capital.name}. ${W.settlements.length-1} towns and villages owe fealty, and the five great houses keep their seats.`);
  // camera opening: establish over capital
  cam.focus.set(W.capital.pos.x,W.capital.pos.y,W.capital.pos.z);
  cam.cur.focus.copy(cam.focus);
  cam.dist=3200;cam.cur.dist=4200;cam.yaw=rand('sim')*Math.PI*2;cam.cur.yaw=cam.yaw-0.4;
  cam.mode='director';
  document.getElementById('loading').style.opacity='0';
  setTimeout(()=>document.getElementById('loading').remove(),900);
  requestAnimationFrame(animate);
}
boot();
</script>
